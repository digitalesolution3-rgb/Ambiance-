<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Burkina Ambiance — Gestion Bar</title>
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script crossorigin src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script crossorigin src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script crossorigin src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0d0f14; --bg2:#151822; --bg3:#1c202c;
    --gold:#d4af37; --gold-dim:#8a7328;
    --text:#eee8da; --text-dim:#9aa0ad;
    --green:#3fae6a; --red:#c94f4f; --blue:#4a90d9;
    --border:#2a2f3d;
    --radius:10px;
  }
  /* Thème clair : fond blanc/gris clair, texte sombre, accent doré assombri pour le contraste */
  html[data-theme="clair"]{
    --bg:#f4f2ee; --bg2:#ffffff; --bg3:#eceae4;
    --gold:#a9791f; --gold-dim:#c9a54a;
    --text:#1b1c1f; --text-dim:#5b5f6a;
    --green:#1f8a4c; --red:#c23b3b; --blue:#2e6fbf;
    --border:#d9d5cc;
  }
  /* Thème néon sombre : noir profond, accents fluo (cyan/magenta), effet lumineux */
  html[data-theme="neon"]{
    --bg:#05050a; --bg2:#0b0b16; --bg3:#12121f;
    --gold:#00f0ff; --gold-dim:#0a8b96;
    --text:#eafcff; --text-dim:#7a8a9a;
    --green:#39ff8f; --red:#ff3b6f; --blue:#5ad1ff;
    --border:#1f2a3a;
  }
  html[data-theme="neon"] .brand h1, html[data-theme="neon"] .card h3, html[data-theme="neon"] .topbar .who b{
    text-shadow:0 0 6px var(--gold), 0 0 14px var(--gold-dim);
  }
  html[data-theme="neon"] .btn:not(.secondary):not(.danger){
    box-shadow:0 0 10px var(--gold-dim);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; overscroll-behavior:none;}
  #root{min-height:100vh; display:flex; flex-direction:column;}
  button{font-family:inherit; cursor:pointer;}
  input,select{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* ---------- Login ---------- */
  .login-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:18px;}
  .brand{text-align:center;}
  .brand h1{margin:0; font-size:26px; letter-spacing:2px; color:var(--gold); font-weight:700;}
  .brand p{margin:4px 0 0; color:var(--text-dim); font-size:13px; letter-spacing:1px;}
  .pin-dots{display:flex; gap:14px; margin:10px 0;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--gold-dim); transition:.15s;}
  .pin-dot.filled{background:var(--gold); border-color:var(--gold);}
  .keypad{display:grid; grid-template-columns:repeat(3,72px); gap:14px;}
  .key{width:72px;height:72px;border-radius:50%; background:var(--bg3); border:1px solid var(--border);
    color:var(--text); font-size:22px; display:flex; align-items:center; justify-content:center;}
  .key:active{background:var(--gold-dim); color:#000;}
  .key.wide{font-size:14px;}
  .login-error{color:var(--red); font-size:13px; min-height:18px;}

  /* ---------- Shell ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:12px 16px;
    background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20;}
  .topbar .who{display:flex; flex-direction:column;}
  .topbar .who b{color:var(--gold); font-size:15px;}
  .topbar .who span{font-size:11px; color:var(--text-dim);}
  .icon-btn{background:none;border:none;color:var(--text-dim); font-size:20px; padding:6px;}
  .content{flex:1; overflow-y:auto; padding:12px 12px 90px;}
  .tabbar{position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--bg2);
    border-top:1px solid var(--border); z-index:20; padding-bottom:env(safe-area-inset-bottom);}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:9px 2px 7px;
    background:none; border:none; color:var(--text-dim); font-size:10px;}
  .tab.active{color:var(--gold);}
  .tab .ic{font-size:19px;}

  /* ---------- Cards / generic ---------- */
  .card{background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
  .card h3{margin:0 0 10px; font-size:14px; color:var(--gold); letter-spacing:.5px; text-transform:uppercase;}
  .row{display:flex; gap:8px; align-items:center;}
  .row.between{justify-content:space-between;}
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px;}
  .field input, .field select{width:100%; padding:10px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:15px;}
  .btn{padding:11px 16px; border-radius:8px; border:none; font-size:14px; font-weight:600; color:#0d0f14;
    background:var(--gold); width:100%;}
  .btn.secondary{background:var(--bg3); color:var(--text); border:1px solid var(--border);}
  .btn.danger{background:var(--red); color:#fff;}
  .btn.sm{width:auto; padding:8px 12px; font-size:12px;}
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600;}
  .pill.owner{background:#3a2f10; color:var(--gold);}
  .pill.gerant{background:#123a2a; color:var(--green);}
  .pill.caissier{background:#132a3a; color:var(--blue);}
  .pill.ok{background:#123a2a; color:var(--green);}
  .pill.danger{background:#3a1414; color:var(--red);}
  .empty{text-align:center; color:var(--text-dim); font-size:13px; padding:30px 10px;}
  .zone-toggle{display:flex; background:var(--bg3); border-radius:8px; padding:3px; margin-bottom:12px;}
  .zone-toggle button{flex:1; padding:8px; border:none; background:none; border-radius:6px; color:var(--text-dim); font-size:13px; font-weight:600;}
  .zone-toggle button.active{background:var(--gold); color:#0d0f14;}

  /* ---------- Table stock ---------- */
  table.stock{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.stock th{background:var(--bg3); color:var(--gold); padding:6px 4px; font-size:10.5px; text-transform:uppercase; position:sticky; top:0;}
  table.stock td{padding:5px 4px; border-bottom:1px solid var(--border); text-align:center;}
  table.stock td.name{text-align:left; color:var(--text);}
  table.stock input{width:52px; padding:5px; background:var(--bg3); border:1px solid var(--border); border-radius:5px; color:var(--text); text-align:center; font-size:12.5px;}
  table.stock tfoot td{font-weight:700; color:var(--gold); background:var(--bg3);}

  /* ---------- Ticket / print ---------- */
  .ticket{background:#fff; color:#000; width:280px; margin:0 auto; padding:14px; font-family:'Courier New',monospace; font-size:12px;}
  .ticket h4{text-align:center; margin:0 0 4px; font-size:14px;}
  .ticket .center{text-align:center;}
  .ticket hr{border:none; border-top:1px dashed #000; margin:8px 0;}
  .ticket .line{display:flex; justify-content:space-between; gap:8px;}
  .ticket .line span:first-child{flex-shrink:0;}
  .ticket .line span:last-child{text-align:right; word-break:break-word; overflow-wrap:anywhere;}
  .ticket .ticket-total{font-size:16px; font-weight:900; border-top:1px dashed #000; border-bottom:1px dashed #000; padding:4px 0; margin:4px 0;}
  @media print{
    body *{visibility:hidden;}
    .ticket, .ticket *{visibility:visible;}
    .ticket{position:absolute; top:0; left:0; width:100%;}
  }

  .journee-badge{background:var(--bg3); border:1px solid var(--gold-dim); color:var(--gold);
    padding:6px 12px; border-radius:20px; font-size:12px; display:inline-flex; align-items:center; gap:6px; margin-bottom:12px;}

  .search-bar{display:flex; gap:8px; margin-bottom:10px;}
  .search-bar input{flex:1; padding:10px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text);}

  .list-item{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);}
  .list-item:last-child{border-bottom:none;}
  .list-item .meta{font-size:11px; color:var(--text-dim);}
  .badge-sync{font-size:10px; padding:1px 7px; border-radius:10px;}
  .badge-sync.on{background:#123a2a; color:var(--green);}
  .badge-sync.off{background:#3a1212; color:var(--red);}

  /* ---------- POS tactile ---------- */
  .pos-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:140px;}
  .pos-tile{position:relative; background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    padding:16px 10px; display:flex; flex-direction:column; align-items:center; gap:6px; min-height:82px;
    color:var(--text); text-align:center;}
  .pos-tile:active{transform:scale(.97);}
  .pos-tile.active{border-color:var(--gold); background:#241f10;}
  .pos-tile .pos-nom{font-size:13px; font-weight:600; line-height:1.2;}
  .pos-tile .pos-prix{font-size:12px; color:var(--gold);}
  .pos-tile .pos-qte{position:absolute; top:-8px; right:-8px; background:var(--gold); color:#0d0f14;
    width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800;}
  .panier-bar{position:fixed; left:0; right:0; bottom:56px; background:var(--bg2); border-top:1px solid var(--gold-dim);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom)); z-index:15; box-shadow:0 -6px 18px #0008;}
  .panier-lignes{max-height:110px; overflow-y:auto; margin-bottom:8px;}
  .panier-ligne{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; padding:3px 0;}
  .mini-btn{width:24px;height:24px;border-radius:50%; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:14px; line-height:1;}
  .panier-total{font-size:15px; margin-bottom:8px; padding-top:6px; border-top:1px dashed var(--border);}

  /* ---------- Barre imprimante / connexion ---------- */
  .printer-bar{display:flex; align-items:center; justify-content:space-between; background:var(--bg2);
    border:1px solid var(--border); border-radius:10px; padding:8px 12px; margin-bottom:10px; font-size:12px;}
  .printer-bar .status-off{color:var(--red);}
  .printer-bar .status-on{color:var(--green);}
  .printer-toggle{display:flex; gap:6px; margin-bottom:12px;}
  .printer-toggle button{flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text-dim); font-size:12px;}
  .printer-toggle button.active{border-color:var(--gold); color:var(--gold); background:#241f10;}

  /* ---------- Panier plein écran ---------- */
  .cart-sheet{position:fixed; inset:0; background:var(--bg); z-index:40; display:flex; flex-direction:column;}
  .cart-header{display:flex; align-items:center; justify-content:space-between; padding:14px 16px;
    border-bottom:1px solid var(--border);}
  .cart-header h2{margin:0; font-size:17px; color:var(--gold);}
  .cart-body{flex:1; overflow-y:auto; padding:12px 16px;}
  .cart-item{background:var(--bg2); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .cart-item .row.between{margin-bottom:6px;}
  .cart-item .qte-ctrl{display:flex; align-items:center; gap:10px;}
  .cart-item .qte-ctrl button{width:28px;height:28px;border-radius:50%; border:1px solid var(--border); background:var(--bg3); color:var(--text);}
  .discount-chips{display:flex; gap:8px; margin:10px 0; flex-wrap:wrap;}
  .discount-chips button{padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--bg3); color:var(--text-dim); font-size:12.5px;}
  .discount-chips button.active{background:var(--gold); color:#0d0f14; border-color:var(--gold);}
  .cart-footer{border-top:1px solid var(--border); padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:var(--bg2);}
  .cart-total-row{display:flex; justify-content:space-between; align-items:center; font-size:20px; font-weight:700; margin-bottom:10px;}
  .cart-total-row .gold{color:var(--gold);}
  .monnaie-box{background:var(--bg3); border-radius:8px; padding:10px; margin-bottom:10px;}
  .btn.ble{background:var(--green); color:#fff;}
  .btn.credit{background:#c9822f; color:#fff;}

  /* ---------- KPI Dashboard ---------- */
  .kpi-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
  .kpi-card{background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; display:flex; flex-direction:column; gap:4px;}
  .kpi-label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px;}
  .kpi-value{font-size:19px; font-weight:700; color:var(--gold);}
  .kpi-sub{font-size:11px; color:var(--text-dim);}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

/* =====================================================================
   CONFIGURATION FIREBASE — remplace par les identifiants du projet
   ===================================================================== */
// Identifiants Firebase encodés en Base64 (évite qu'ils traînent en clair dans le code source)
const FIREBASE_CONFIG_B64 = "eyJhcGlLZXkiOiAiQUl6YVN5QWxYOFdJR0RaVkpzT3M2VWZBUEFaTk00NGk4cmo2Zm93IiwgImF1dGhEb21haW4iOiAiZGlnaXRhLTdlODdlLmZpcmViYXNlYXBwLmNvbSIsICJwcm9qZWN0SWQiOiAiZGlnaXRhLTdlODdlIiwgInN0b3JhZ2VCdWNrZXQiOiAiZGlnaXRhLTdlODdlLmZpcmViYXNlc3RvcmFnZS5hcHAiLCAibWVzc2FnaW5nU2VuZGVySWQiOiAiMjQwNDM5MTQ5MjU2IiwgImFwcElkIjogIjE6MjQwNDM5MTQ5MjU2OndlYjphNzAxNGQyNDQ2NDdhYWE4ZThkYmZkIiwgIm1lYXN1cmVtZW50SWQiOiAiRy1QMTIzRVNWSzBRIn0=";
const firebaseConfig = JSON.parse(atob(FIREBASE_CONFIG_B64));

let db = null;
let firebaseOK = false;
try{
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  firebaseOK = true;
}catch(e){ console.warn("Firebase non initialisé :", e); }

/* =====================================================================
   MULTI-TENANT — chaque bar (client) est isolé sous shops/{shopId}/...
   CURRENT_SHOP_ID est fixé une fois au démarrage (après l'écran de
   configuration du bar) puis utilisé par toutes les collections Firestore.
   ===================================================================== */
let CURRENT_SHOP_ID = null;
function setShopIdActif(id){ CURRENT_SHOP_ID = id; }
function shopDocRef(){ return db.collection("shops").doc(CURRENT_SHOP_ID); }
function shopCol(nom){ return shopDocRef().collection(nom); }
function genererShopId(){
  return "bar-" + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
}
const DEV_PANEL_PIN = "761278"; // code d'accès développeur (panneau SaaS)

/* =====================================================================
   UTILITAIRES
   ===================================================================== */
// Clé locale scindée par bar (shopId) : chaque bar a ses propres données hors-ligne,
// même si plusieurs bars sont testés sur le même appareil/navigateur.
function getLSKey(){ return "burkina_ambiance_v1_" + (CURRENT_SHOP_ID || "sans_bar"); }
const DEVICE_SHOP_KEY = "burkina_device_shop_id"; // référence locale : quel bar cet appareil utilise

function loadLS(){
  try{ return JSON.parse(localStorage.getItem(getLSKey())) || {}; }catch(e){ return {}; }
}
function saveLS(data){
  try{ localStorage.setItem(getLSKey(), JSON.stringify(data)); }catch(e){}
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function fmtFCFA(n){
  n = Math.round(Number(n)||0);
  const neg = n < 0;
  const chiffres = Math.abs(n).toString();
  let groupe = "";
  for(let i=0;i<chiffres.length;i++){
    if(i>0 && (chiffres.length-i)%3===0) groupe += " "; // espace ASCII simple, sûr pour toute imprimante
    groupe += chiffres[i];
  }
  return (neg?"-":"") + groupe + " F";
}

async function hashPin(pin){
  const enc = new TextEncoder().encode("burkina-salt-" + pin);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* Calcule la "journée comptable" (YYYY-MM-DD) en fonction de l'heure d'arrêt.
   Ex : heureArret = 2 -> tout ce qui se passe entre 00h00 et 01h59 appartient
   encore à la journée comptable de la veille. */
function journeeComptable(date, heureArret){
  const d = new Date(date);
  if(d.getHours() < heureArret){
    d.setDate(d.getDate()-1);
  }
  return d.toISOString().slice(0,10);
}

function formatDateFR(iso){
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
}

/* Renvoie {debut, fin} (YYYY-MM-DD, lundi à dimanche) de la semaine calendaire
   contenant la date "journee" donnée. */
function semaineDe(journee){
  const d = new Date(journee+"T00:00:00");
  const jour = d.getDay(); // 0=dimanche
  const decalageLundi = jour===0 ? -6 : 1-jour;
  const lundi = new Date(d); lundi.setDate(d.getDate()+decalageLundi);
  const dimanche = new Date(lundi); dimanche.setDate(lundi.getDate()+6);
  return { debut: lundi.toISOString().slice(0,10), fin: dimanche.toISOString().slice(0,10) };
}

function moisDe(journee){
  return journee.slice(0,7); // "YYYY-MM"
}

/* Calcule CA et marge bénéficiaire pour un ensemble de ventes.
   La marge utilise le prixAchat enregistré au moment de chaque vente (snapshot),
   ce qui garde le calcul exact même si le prix d'achat change ensuite. */
function calculerCAEtMarge(ventes){
  let ca = 0, cout = 0;
  ventes.forEach(v=>{
    ca += v.total;
    (v.items||[]).forEach(it=>{
      const achat = it.prixAchat || 0;
      cout += achat * it.qte;
    });
  });
  return { ca, cout, marge: ca - cout };
}

/* Échappe une valeur pour l'insérer dans une cellule CSV (gère virgules, guillemets, retours ligne) */
function csvEchapper(val){
  const s = (val===null || val===undefined) ? "" : String(val);
  if(/[",\n;]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

/* Génère un CSV des ventes (une ligne par article vendu) et déclenche le téléchargement.
   Compatible Excel FR (séparateur point-virgule, BOM UTF-8 pour les accents). */
function exporterVentesCSV(ventes, nomFichier){
  const entetes = ["Date","Journée","Zone","Caissier","Produit","Quantité","Prix unitaire","Sous-total","Remise %","Total vente","Crédit","Client crédit","Téléphone client","Motif crédit","Payé","Client fidélité","Téléphone fidélité","Annulée","Raison annulation","Note"];
  const lignes = [entetes.map(csvEchapper).join(";")];
  ventes.forEach(v=>{
    (v.items && v.items.length ? v.items : [{nom:"(vente sans article)", qte:"", prixUnitaire:""}]).forEach(it=>{
      lignes.push([
        v.date, v.journee, v.zone, v.caissierNom,
        it.nom, it.qte, it.prixUnitaire,
        v.sousTotal, v.remise||0, v.total,
        v.credit?"Oui":"Non", v.clientCredit||"", v.clientTelephone||"", v.clientMotif||"", v.credit?(v.paye?"Oui":"Non"):"",
        v.clientFideliteNom||"", v.clientFideliteTelephone||"",
        v.annulee?"Oui":"Non", v.raisonAnnulation||"", v.note||""
      ].map(csvEchapper).join(";"));
    });
  });
  const csv = "\uFEFF" + lignes.join("\r\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nomFichier;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* Construit le texte du rapport journalier (recettes/dépenses/ventes) pour envoi WhatsApp. */
function genererRapportTexte(journeeStr, state, settings){
  const ventesJour = (state.ventes||[]).filter(v=>v.journee===journeeStr && !v.annulee);
  const { ca, marge } = calculerCAEtMarge(ventesJour);
  const nbAnnulees = (state.ventes||[]).filter(v=>v.journee===journeeStr && v.annulee).length;
  const c = state.clotures[journeeStr] || {};
  const totalRecette = (c.recetteTerrasse||0)+(c.recetteBar||0)+(c.recetteCave||0);
  const totalDepense = (c.depenseTerrasse||0)+(c.depenseBar||0)+(c.depenseCave||0);
  const totalVersement = (c.versementTerrasse||0)+(c.versementBar||0)+(c.versementCave||0);
  const totalCredit = (c.creditHomme||0)+(c.creditFemme||0);

/* Bip sonore court d'alerte (stock bas, etc.) — généré directement, sans fichier audio externe. */
function biperAlerte(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.25);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.25);
  }catch(e){ /* silencieux si non supporté */ }
  if(navigator.vibrate) navigator.vibrate(120);
}

/* =====================================================================
   IMPRESSION THERMIQUE BLUETOOTH (ESC/POS)
   Compatible avec la plupart des mini-imprimantes BLE 58/80mm vendues
   en Afrique de l'Ouest (protocole ESC/POS générique).
   ===================================================================== */
const BLE_SERVICE_UUID = "000018f0-0000-1000-8000-00805f9b34fb";
const BLE_CHAR_UUID = "00002af1-0000-1000-8000-00805f9b34fb";
let blePrinterRef = { device:null, characteristic:null };

async function connecterImprimanteBLE(){
  if(!navigator.bluetooth){
    alert("Le Bluetooth n'est pas disponible dans ce navigateur. Utilise Chrome sur Android.");
    return false;
  }
  try{
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [BLE_SERVICE_UUID, "49535343-fe7d-4ae5-8fa9-9fafd205e455"]
    });
    const server = await device.gatt.connect();
    let characteristic = null;
    try{
      const service = await server.getPrimaryService(BLE_SERVICE_UUID);
      characteristic = await service.getCharacteristic(BLE_CHAR_UUID);
    }catch(e){
      // Repli sur le service générique utilisé par d'autres imprimantes BLE courantes
      const service = await server.getPrimaryService("49535343-fe7d-4ae5-8fa9-9fafd205e455");
      characteristic = await service.getCharacteristic("49535343-8841-43f4-a8d4-ecbe34729bb3");
    }
    blePrinterRef = { device, characteristic };
    device.addEventListener('gattserverdisconnected', ()=>{ blePrinterRef = {device:null, characteristic:null}; });
    return true;
  }catch(e){
    console.error(e);
    alert("Connexion imprimante impossible : " + e.message);
    return false;
  }
}

/* Corrige le bug des « écritures cassées » sur les reçus thermiques.
   Les mini-imprimantes ESC/POS attendent un encodage mono-octet (CP437/850/1252),
   pas de l'UTF-8. Un caractère accentué (É, È, Ç, °, œ...) encodé en UTF-8
   devient alors 2 octets illisibles à l'impression — d'où les caractères cassés,
   surtout visibles sur le reçu d'avoir ("REÇU D'AVOIR", "Établissement", "N°").
   On translittère donc vers de l'ASCII pur avant impression thermique
   (l'écran et l'impression navigateur, eux, gardent les accents normalement). */
function translittererPourImprimante(str){
  return String(str==null ? "" : str)
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/œ/g,'oe').replace(/Œ/g,'OE')
    .replace(/æ/g,'ae').replace(/Æ/g,'AE')
    .replace(/ß/g,'ss')
    .replace(/°/g,'deg')
    .replace(/[’‘]/g,"'").replace(/[“”]/g,'"')
    .replace(/[–—]/g,'-')
    .replace(/[^\x00-\x7F]/g,'?'); // filet de sécurité pour tout caractère non ASCII restant
}

function construireTicketEscPos(lignesTexte, largeurMM){
  const cols = largeurMM===80 ? 48 : 32;
  const ESC=0x1B, GS=0x1D;
  const enc = new TextEncoder();
  let buf = [];
  const push = a => buf.push(...a);
  const text = t => push(Array.from(enc.encode(translittererPourImprimante(t).slice(0,300))));
  const feed = (n=1) => { for(let i=0;i<n;i++) push([0x0A]); };

  push([ESC,0x40]); // init
  lignesTexte.forEach(l=>{
    if(l.center) push([ESC,0x61,0x01]); else push([ESC,0x61,0x00]);
    if(l.bold) push([ESC,0x45,1]); else push([ESC,0x45,0]);
    if(l.big) push([GS,0x21,0x11]); else push([GS,0x21,0x00]);
    if(l.dashes) text("-".repeat(cols));
    else if(l.split){
      const g = translittererPourImprimante(l.split[0]), d = translittererPourImprimante(l.split[1]);
      const colsEffectif = l.big ? Math.floor(cols/2) : cols;
      const espace = Math.max(1, colsEffectif - g.length - d.length);
      text(g + " ".repeat(espace) + d);
    } else text(l.text || "");
    feed(1);
  });
  push([GS,0x21,0x00]); push([ESC,0x45,0]);
  feed(3);
  push([GS,0x56,0x41,0x00]); // coupe papier (si supportée)
  return new Uint8Array(buf);
}

/* Convertit une image (dataURL) en bitmap monochrome pour impression ESC/POS.
   80mm ≈ 576 points, 57/58mm ≈ 384 points (valeurs standard à ajuster selon
   le modèle exact de l'imprimante si besoin). */
function imageVersRasterEscPos(dataUrl, largeurDots){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>{
      const echelle = largeurDots / img.width;
      const hauteur = Math.max(1, Math.round(img.height * echelle));
      const canvas = document.createElement('canvas');
      canvas.width = largeurDots; canvas.height = hauteur;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#fff"; ctx.fillRect(0,0,largeurDots,hauteur);
      ctx.drawImage(img, 0, 0, largeurDots, hauteur);
      const px = ctx.getImageData(0,0,largeurDots,hauteur).data;
      const octetsParLigne = Math.ceil(largeurDots/8);
      const bitmap = new Uint8Array(octetsParLigne*hauteur);
      for(let y=0;y<hauteur;y++){
        for(let x=0;x<largeurDots;x++){
          const i = (y*largeurDots+x)*4;
          const gris = (px[i]+px[i+1]+px[i+2])/3;
          if(gris < 140) bitmap[y*octetsParLigne + (x>>3)] |= (0x80 >> (x&7));
        }
      }
      resolve({bitmap, octetsParLigne, hauteur});
    };
    img.onerror = ()=>reject(new Error("Logo illisible"));
    img.src = dataUrl;
  });
}

function commandeRasterLogo({bitmap, octetsParLigne, hauteur}){
  const GS = 0x1D;
  const xL = octetsParLigne & 0xFF, xH = (octetsParLigne>>8) & 0xFF;
  const yL = hauteur & 0xFF, yH = (hauteur>>8) & 0xFF;
  return new Uint8Array([GS,0x76,0x30,0x00, xL,xH,yL,yH, ...bitmap]);
}

async function envoyerVersImprimante(data){
  if(!blePrinterRef.characteristic){
    alert("Aucune imprimante connectée. Appuie sur \"Connecter\" d'abord.");
    return false;
  }
  const car = blePrinterRef.characteristic;
  const supporteSansReponse = !car.properties || car.properties.writeWithoutResponse!==false;
  const taillePaquet = 96;
  try{
    for(let i=0;i<data.length;i+=taillePaquet){
      const chunk = data.slice(i, i+taillePaquet);
      try{
        if(supporteSansReponse) await car.writeValueWithoutResponse(chunk);
        else await car.writeValue(chunk);
      }catch(erreurEcriture){
        // Repli : certaines imprimantes n'acceptent que writeValue (avec accusé de réception)
        await car.writeValue(chunk);
      }
      await new Promise(r=>setTimeout(r, 12)); // évite de saturer le tampon de l'imprimante
    }
    return true;
  }catch(e){
    console.error(e);
    alert("Erreur d'impression : " + e.message + "\n\nVérifie que l'imprimante est allumée et à portée, puis reconnecte-la.");
    return false;
  }
}

/* Fonction combinée : logo (si présent) + texte + coupe, répétée selon le
   nombre de copies configuré dans les réglages. */
async function imprimerTicketBLE(lignesTexte, largeurMM, settings){
  if(!blePrinterRef.characteristic) return false;
  const largeurDots = largeurMM===80 ? 576 : 384;
  let logoBytes = null;
  if(settings.logoDataUrl){
    try{
      const raster = await imageVersRasterEscPos(settings.logoDataUrl, largeurDots);
      logoBytes = commandeRasterLogo(raster);
    }catch(e){ console.warn("Logo non imprimé :", e.message); }
  }
  const texteBytes = construireTicketEscPos(lignesTexte, largeurMM);
  const copies = Math.max(1, Number(settings.copiesTicket)||1);
  let ok = true;
  for(let c=0; c<copies; c++){
    if(logoBytes) ok = await envoyerVersImprimante(logoBytes) && ok;
    ok = await envoyerVersImprimante(texteBytes) && ok;
  }
  return ok;
}

function piedDeTicket(settings){
  const lignes = (settings.piedTicket || "Merci de votre confiance !").split("\n").filter(Boolean).slice(0,3);
  return lignes.length ? lignes : ["Merci de votre confiance !"];
}

function ticketLignesVente(data, settings){
  const lignes = [
    {text: settings.nomEtablissement || "BURKINA AMBIANCE", center:true, bold:true, big:true},
  ];
  if(settings.adresse) lignes.push({text: settings.adresse, center:true});
  lignes.push({text: "TICKET DE VENTE", center:true});
  lignes.push({dashes:true});
  data.items.forEach(it=>{
    lignes.push({split:[it.nom+" x"+it.qte, fmtFCFA(it.prixUnitaire*it.qte)]});
  });
  if(data.remise>0) lignes.push({split:["Remise "+data.remise+"%", "-"+fmtFCFA(data.montantRemise)]});
  lignes.push({dashes:true});
  lignes.push({split:["TOTAL", fmtFCFA(data.total)], bold:true, big:true});
  if(data.montantRecu) lignes.push({split:["Reçu", fmtFCFA(data.montantRecu)]});
  if(data.monnaie!=null) lignes.push({split:["Monnaie", fmtFCFA(data.monnaie)]});
  lignes.push({dashes:true});
  if(data.note && data.note.trim()){
    lignes.push({text:"Note :", bold:true});
    lignes.push({text:data.note.trim()});
    lignes.push({dashes:true});
  }
  lignes.push({text:"Caissier : "+data.caissierNom});
  lignes.push({text:data.date});
  lignes.push({dashes:true});
  piedDeTicket(settings).forEach(l=> lignes.push({text:l, center:true}));
  return lignes;
}

function ticketLignesAvoir(data, settings){

}

/* =====================================================================
   COMPOSANT : PANIER PLEIN ECRAN (avec remise, monnaie, impression BLE)
   ===================================================================== */
function PanierSheet({lignes, onQte, onVider, onClose, onValider, currentUser, settings}){
  const [remise,setRemise] = useState(0);
  const [remisePerso,setRemisePerso] = useState("");
  const [note,setNote] = useState("");
  const [montantRecu,setMontantRecu] = useState("");
  const [afficherMonnaie,setAfficherMonnaie] = useState(false);
  const [connecte,setConnecte] = useState(!!blePrinterRef.characteristic);
  const [largeurBLE,setLargeurBLE] = useState(80);
  const [busy,setBusy] = useState(false);
  const [afficherCredit,setAfficherCredit] = useState(false);
  const [creditNom,setCreditNom] = useState("");
  const [creditTelephone,setCreditTelephone] = useState("");
  const [creditMotif,setCreditMotif] = useState("");
  const [afficherFidelite,setAfficherFidelite] = useState(false);
  const [fideliteNom,setFideliteNom] = useState("");
  const [fideliteTelephone,setFideliteTelephone] = useState("");

  const sousTotal = lignes.reduce((s,l)=>s+l.sousTotal,0);
  const montantRemise = Math.round(sousTotal * remise/100);
  const total = sousTotal - montantRemise;
  const monnaie = montantRecu ? Number(montantRecu) - total : null;

  const connecter = async ()=>{
    setBusy(true);
    const ok = await connecterImprimanteBLE();
    setConnecte(ok);
    setBusy(false);
  };

  const finaliser = async (avecImpression, aCredit)=>{
    if(lignes.length===0) return;

    // Vente à crédit : on affiche d'abord le formulaire (nom, téléphone, motif)
    // avant de valider — nécessaire pour l'historique des créanciers.
    if(aCredit && !afficherCredit){
      setAfficherCredit(true);
      return;
    }
    let clientCredit = null, clientTelephone = null, clientMotif = null;
    if(aCredit){
      if(!creditNom.trim() || !creditTelephone.trim()){
        alert("Nom et numéro de téléphone du client sont obligatoires pour une vente à crédit.");
        return;
      }
      clientCredit = creditNom.trim();
      clientTelephone = creditTelephone.trim();
      clientMotif = creditMotif.trim() || null;
    }

    setBusy(true);

    let ok = true;
    if(avecImpression){
      let pret = connecte;
      if(!pret){
        pret = await connecterImprimanteBLE();
        setConnecte(pret);
      }
      if(!pret){
        setBusy(false);
        return; // connecterImprimanteBLE affiche déjà une alerte d'erreur
      }
    }

    const venteData = onValider({
      remise, montantRemise, total, note, credit:aCredit, clientCredit, clientTelephone, clientMotif,
      clientFideliteNom: !aCredit ? (fideliteNom.trim()||null) : null,
      clientFideliteTelephone: !aCredit ? (fideliteTelephone.trim()||null) : null
    });

    if(avecImpression){
      const lignesTicket = ticketLignesVente({
        ...venteData, remise, montantRemise, total,
        montantRecu: montantRecu?Number(montantRecu):null, monnaie
      }, settings);
      ok = await imprimerTicketBLE(lignesTicket, largeurBLE, settings);
    }

    setBusy(false);
    if(avecImpression && ok) alert("✅ Vente enregistrée et ticket imprimé !");
    else if(avecImpression && !ok) alert("⚠️ Vente enregistrée, mais l'impression a échoué. Tu peux la réimprimer depuis \"Mes ventes\".");
    onClose();
  };

  return (
    <div className="cart-sheet">
      <div className="cart-header">
        <h2>🛒 Panier ({lignes.length})</h2>
        <button className="icon-btn" onClick={onClose}>✕</button>
      </div>

      <div className="cart-body">
        <div className="printer-bar">
          <span className={connecte?"status-on":"status-off"}>
            {connecte? "🖨️ Imprimante connectée" : "❌ Imprimante non connectée"}
          </span>
          {!connecte && <button className="btn sm secondary" onClick={connecter} disabled={busy}>Connecter</button>}
        </div>
        <div className="printer-toggle">
          <button className={largeurBLE===80?"active":""} onClick={()=>setLargeurBLE(80)}>BLE 80mm</button>
          <button className={largeurBLE===57?"active":""} onClick={()=>setLargeurBLE(57)}>BLE 57mm</button>
        </div>

        {lignes.map(l=>(
          <div className="cart-item" key={l.prod.id}>
            <div className="row between">
              <span>{l.prod.nom}</span>
              <b>{fmtFCFA(l.sousTotal)}</b>
            </div>
            <div className="row between">
              <span className="meta" style={{fontSize:11, color:"var(--text-dim)"}}>{fmtFCFA(l.prod.prix)} / unité</span>
              <div className="qte-ctrl">
                <button onClick={()=>onQte(l.prod.id,-1)}>−</button>
                <b>{l.qte}</b>
                <button onClick={()=>onQte(l.prod.id,1)}>+</button>
              </div>
            </div>
          </div>
        ))}

        <div className="field">
          <label>Remise</label>
          <div className="discount-chips">
            {[0,5,10,15,20].map(p=>(
              <button key={p} className={remise===p?"active":""} onClick={()=>{setRemise(p); setRemisePerso("");}}>
                {p===0?"Aucune":p+"%"}
              </button>
            ))}
            <input placeholder="%" value={remisePerso} style={{width:56, padding:6, background:"var(--bg3)", border:"1px solid var(--border)", borderRadius:20, color:"var(--text)", textAlign:"center"}}
              onChange={e=>{setRemisePerso(e.target.value); setRemise(Number(e.target.value)||0);}} />
          </div>
        </div>

        <div className="field">
          <label>Note (optionnel)</label>
          <input value={note} placeholder="Ajouter une note à cette vente" onChange={e=>setNote(e.target.value)} />
        </div>

        <button className="btn secondary sm" onClick={()=>setAfficherMonnaie(a=>!a)}>💰 Calculer la monnaie</button>
        {afficherMonnaie && (
          <div className="monnaie-box">
            <div className="field" style={{marginBottom:6}}>
              <label>Montant reçu du client</label>
              <input type="number" value={montantRecu} placeholder="0" onChange={e=>setMontantRecu(e.target.value)} />
            </div>
            {montantRecu && (
              <div className="row between">
                <span>Monnaie à rendre</span>
                <b style={{color: monnaie<0 ? "var(--red)":"var(--green)"}}>{fmtFCFA(monnaie)}</b>
              </div>
            )}
          </div>
        )}

        <button className="btn secondary sm" onClick={()=>setAfficherFidelite(a=>!a)}>🎁 Client fidélité (optionnel)</button>
        {afficherFidelite && (
          <div className="monnaie-box">
            <div className="field" style={{marginBottom:6}}>
              <label>Nom du client</label>
              <input value={fideliteNom} placeholder="Nom et prénom" onChange={e=>setFideliteNom(e.target.value)} />
            </div>
            <div className="field">
              <label>Numéro de téléphone</label>
              <input value={fideliteTelephone} placeholder="Ex : 70000000" inputMode="tel" onChange={e=>setFideliteTelephone(e.target.value)} />
            </div>
          </div>
        )}

/* =====================================================================
   MODULE : VENTE (CATALOGUE / CAISSE TACTILE)
   ===================================================================== */
function VenteModule({state, patchState, currentUser, journee, settings}){
  // Zones autorisées pour ce caissier (le propriétaire peut restreindre l'accès par zone)
  const zonesAutorisees = (currentUser.zones && currentUser.zones.length>0)
    ? currentUser.zones
    : (currentUser.zone && currentUser.zone!=="toutes" ? [currentUser.zone] : ["bar","terrasse","liqueur"]);
  const zonesDisponibles = zonesAutorisees.includes("toutes") ? ["bar","terrasse","liqueur"] : zonesAutorisees;

  const [zone,setZone] = useState(zonesDisponibles[0] || "bar");
  const [recherche,setRecherche] = useState("");
  const [panier,setPanier] = useState({}); // { prodId: qte }
  const [panierOuvert,setPanierOuvert] = useState(false);

  const produits = state.produits.filter(p=>
    p.zone===zone && (recherche.trim()==="" || p.nom.toLowerCase().includes(recherche.toLowerCase()))
  );

  const ajouter = (prodId)=>{
    setPanier(p=>{
      const nouvelleQte = (p[prodId]||0)+1;
      const prod = state.produits.find(x=>x.id===prodId);
      if(prod){
        const restant = (prod.stock||0) - nouvelleQte;
        if(restant <= (prod.seuilAlerte||5)) biperAlerte();
      }
      return {...p, [prodId]: nouvelleQte};
    });
  };
  const changerQte = (prodId, delta)=>{
    setPanier(p=>{
      const n = {...p};
      n[prodId] = (n[prodId]||0) + delta;
      if(n[prodId]<=0) delete n[prodId];
      return n;
    });
  };
  const vider = ()=>{ setPanier({}); setPanierOuvert(false); };

  const lignes = Object.entries(panier).map(([prodId,qte])=>{
    const prod = state.produits.find(p=>p.id===prodId);
    return prod ? {prod, qte, sousTotal: prod.prix*qte} : null;
  }).filter(Boolean);

  const nbArticles = lignes.reduce((s,l)=>s+l.qte,0);
  const totalRapide = lignes.reduce((s,l)=>s+l.sousTotal,0);

  const validerVente = ({remise, montantRemise, total, note, credit, clientCredit, clientTelephone, clientMotif, clientFideliteNom, clientFideliteTelephone})=>{
    const vente = {
      id: uid(),
      zone,
      items: lignes.map(l=>({prodId:l.prod.id, nom:l.prod.nom, qte:l.qte, prixUnitaire:l.prod.prix, prixAchat:l.prod.prixAchat||0})),
      sousTotal: totalRapide,
      remise, montantRemise, total,
      note: note||"",
      credit: !!credit,
      clientCredit: clientCredit||null,
      clientTelephone: clientTelephone||null,
      clientMotif: clientMotif||null,
      clientFideliteNom: clientFideliteNom||null,
      clientFideliteTelephone: clientFideliteTelephone||null,
      paye: credit ? false : null,
      caissierId: currentUser.id,
      caissierNom: currentUser.nom,
      journee,
      date: new Date().toLocaleString('fr-FR'),
      timestamp: Date.now()
    };
    patchState(draft=>{
      if(!draft.ventes) draft.ventes = [];
      draft.ventes.push(vente);
      if(!draft.stock[journee]) draft.stock[journee] = {};
      if(!draft.stock[journee][zone]) draft.stock[journee][zone] = {};
      lignes.forEach(l=>{
        if(!draft.stock[journee][zone][l.prod.id]) draft.stock[journee][zone][l.prod.id] = {initial:0,entree:0,reste:0};
        // Décrémente le stock permanent du produit
        const p = draft.produits.find(x=>x.id===l.prod.id);
        if(p){
          p.stock = Math.max(0, (p.stock||0) - l.qte);
          queueWrite("produits", p.id, p);
        }
      });
    });
    queueWrite("ventes", vente.id, vente);
    setPanier({});
    return vente;
  };

  return (
    <div>
      {panierOuvert && (
        <PanierSheet
          lignes={lignes}
          onQte={changerQte}
          onVider={vider}
          onClose={()=>setPanierOuvert(false)}
          onValider={validerVente}
          currentUser={currentUser}
          settings={settings}
        />
      )}

      <div className="journee-badge">📅 {formatDateFR(journee)}</div>
      <div className="search-bar">
        <input placeholder="🔍 Rechercher un produit..." value={recherche} onChange={e=>setRecherche(e.target.value)} />
      </div>
      {zonesDisponibles.length>1 && (
        <div className="zone-toggle">
          {zonesDisponibles.map(z=>(
            <button key={z} className={zone===z?"active":""} onClick={()=>setZone(z)}>
              {z==="bar"?"Bar":z==="terrasse"?"Terrasse":"Liqueur/Cave"}
            </button>
          ))}
        </div>
      )}

      <div className="pos-grid">
        {produits.length===0 ? <div className="empty" style={{gridColumn:"span 2"}}>Aucun produit trouvé</div> :
          produits.map(p=>{
            const qte = panier[p.id]||0;
            const restant = (p.stock||0) - qte;
            const stockBas = restant <= (p.seuilAlerte||5);
            return (
              <button key={p.id} className={"pos-tile" + (qte>0?" active":"")} onClick={()=>ajouter(p.id)}>
                {qte>0 && <span className="pos-qte">{qte}</span>}
                <span className="pos-nom">{p.nom}</span>
                <span className="pos-prix">{fmtFCFA(p.prix)}</span>
                {stockBas && <span className="pill" style={{background:"#3a1212", color:"var(--red)", fontSize:10, marginTop:2}}>⚠️ Stock bas ({Math.max(0,restant)})</span>}
              </button>
            );
          })
        }
      </div>

      {lignes.length>0 && !panierOuvert && (
        <div className="panier-bar" onClick={()=>setPanierOuvert(true)} style={{cursor:"pointer"}}>
          <div className="panier-total row between">
            <span>🛒 {nbArticles} article{nbArticles>1?"s":""}</span>
            <b>{fmtFCFA(totalRapide)}</b>
          </div>
          <button className="btn">Voir le panier</button>
        </div>
      )}
    </div>
  );
}

/* =====================================================================
   COMPOSANT : PAVE NUMERIQUE (LOGIN PIN)
   ===================================================================== */
function LoginScreen({onLogin, settings, users, onBypass, onCreerProprietaire, onOuvrirDevPanel}){
  const [pin,setPin] = useState("");
  const [error,setError] = useState("");
  const [busy,setBusy] = useState(false);

  // Accès panneau développeur : triple-clic sur le titre (dans la fenêtre de 700ms),
  // distinct de l'appui long réservé au bypass propriétaire ci-dessous.
  const clicsRef = useRef([]);
  const gererClicTitre = ()=>{
    const maintenant = Date.now();
    clicsRef.current = [...clicsRef.current.filter(t=>maintenant-t<700), maintenant];
    if(clicsRef.current.length>=3){
      clicsRef.current = [];
      const code = prompt("Code d'accès développeur :");
      if(code===null) return;
      if(code.trim() !== DEV_PANEL_PIN){ alert("Code incorrect."); return; }
      onOuvrirDevPanel();
    }
  };

  const press = (d)=>{
    if(busy) return;
    setError("");
    if(d==="back"){ setPin(p=>p.slice(0,-1)); return; }
    if(pin.length>=6) return;
    setPin(p=>p+d);
  };

  const valider = ()=>{
    if(pin.length<4 || busy) return;
    setBusy(true);
    hashPin(pin).then(h=>{
      onLogin(h, (msg)=>{ setError(msg); setPin(""); setBusy(false); });
    });
  };

  // Soumission automatique uniquement quand le PIN atteint la longueur max (6).
  // Pour les PIN plus courts (4 ou 5 chiffres), l'utilisateur valide avec le bouton ✓.
  useEffect(()=>{
    if(pin.length===6) valider();
  },[pin]);

  // Accès propriétaire caché : appui long (≥800ms) sur le titre + code secret 898989.
  // L'appui long est utilisé plutôt que le double-tap car sur mobile, deux taps rapides
  // sont souvent interceptés par le geste natif "double-tap pour zoomer" du navigateur,
  // ce qui rend le double-tap peu fiable selon les appareils. L'appui long n'a pas cette
  // ambiguïté et fonctionne de façon constante sur tous les navigateurs tactiles.
  const pressTimerRef = useRef(null);
  const demarrerAppuiLong = ()=>{
    annulerAppuiLong();
    pressTimerRef.current = setTimeout(()=>{
      pressTimerRef.current = null;
      accesProprietaireCache();
    }, 800);
  };
  const annulerAppuiLong = ()=>{
    if(pressTimerRef.current){ clearTimeout(pressTimerRef.current); pressTimerRef.current = null; }
  };
  const accesProprietaireCache = ()=>{
    const code = prompt("Code d'accès propriétaire :");
    if(code===null) return;
    if(code.trim() !== "898989"){ alert("Code incorrect."); return; }
    const proprietaire = (users||[]).find(u=>u.role==="owner");
    if(proprietaire){ onBypass(proprietaire); return; }
    // Auto-réparateur : si aucun compte owner n'existe encore (bootstrap pas encore
    // exécuté, données corrompues, ancien onglet non rechargé...), on en crée un
    // immédiatement au lieu de simplement bloquer l'accès.
    onCreerProprietaire().then(nouveau=>{
      alert("Aucun compte propriétaire n'existait : un nouveau a été créé (PIN par défaut 999999, à changer dans Admin).");
      onBypass(nouveau);
    });
  };

  return (
    <div className="login-wrap">
      <div className="brand"
        onPointerDown={demarrerAppuiLong}
        onPointerUp={annulerAppuiLong}
        onPointerLeave={annulerAppuiLong}
        onPointerCancel={annulerAppuiLong}
        onClick={gererClicTitre}
        onContextMenu={(e)=>e.preventDefault()}
        style={{cursor:"pointer", touchAction:"manipulation", userSelect:"none", WebkitTouchCallout:"none"}}>
        <h1>{settings.nomEtablissement || "BURKINA AMBIANCE"}</h1>
        <p>La légende continue</p>
      </div>
      <div className="pin-dots">
        {[0,1,2,3,4,5].map(i=>(
          <div key={i} className={"pin-dot" + (i<pin.length ? " filled":"")}></div>
        ))}
      </div>
      <div className="login-error">{error}</div>
      <div className="keypad">
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} className="key" onClick={()=>press(String(n))}>{n}</button>
        ))}
        <button className="key wide" onClick={()=>setPin("")} style={{fontSize:12}}>Effacer</button>
        <button className="key" onClick={()=>press("0")}>0</button>
        <button className="key wide" onClick={()=>press("back")}>⌫</button>
        <button className="key wide" style={{gridColumn:"span 3", borderRadius:30, background:"var(--gold)", color:"#0d0f14", fontWeight:700}} onClick={valider}>✓ Valider</button>
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : STOCK
   ===================================================================== */
function StockModule({state, patchState, currentUser, journee}){
  const [zone,setZone] = useState("bar");
  const zones = ["bar","terrasse","liqueur"];
  const produits = state.produits.filter(p=>p.zone===zone);
  const entries = state.stock[journee]?.[zone] || {};

  const update = (prodId, field, val) => {
    const num = val===""? "" : Number(val);
    let nouvelEtat;
    patchState(draft=>{
      if(!draft.stock[journee]) draft.stock[journee] = {};
      if(!draft.stock[journee][zone]) draft.stock[journee][zone] = {};
      if(!draft.stock[journee][zone][prodId]) draft.stock[journee][zone][prodId] = {initial:0,entree:0,reste:0};
      draft.stock[journee][zone][prodId][field] = num;
      nouvelEtat = draft.stock[journee][zone];
    });
    // Une seule collection "stock", un document par journée+zone (ex: "2026-07-04_bar")
    queueWrite("stock", journee + "_" + zone, {journee, zone, produits: nouvelEtat});
  };

  let totalVenteF = 0;

  return (
    <div>
      <div className="journee-badge">📅 Journée comptable : {formatDateFR(journee)}</div>
      <div className="zone-toggle">
        {zones.map(z=>(
          <button key={z} className={zone===z?"active":""} onClick={()=>setZone(z)}>
            {z==="bar"?"Bar":z==="terrasse"?"Terrasse":"Liqueur/Cave"}
          </button>
        ))}
      </div>
      <div className="card" style={{overflowX:"auto", padding:8}}>
        <table className="stock">
          <thead>
            <tr>
              <th style={{textAlign:"left"}}>Produit</th>
              <th>Initial</th>
              <th>Entrée</th>
              <th>Total</th>
              <th>Reste</th>
              <th>Vente</th>
              <th>Vente F</th>
            </tr>
          </thead>
          <tbody>
            {produits.map(p=>{
              const e = entries[p.id] || {initial:0,entree:0,reste:0};
              const total = (Number(e.initial)||0) + (Number(e.entree)||0);
              const vente = Math.max(0, total - (Number(e.reste)||0));
              const venteF = vente * p.prix;
              totalVenteF += venteF;
              return (
                <tr key={p.id}>
                  <td className="name">{p.nom}</td>
                  <td><input type="number" value={e.initial===0?"":e.initial} placeholder="0" onChange={ev=>update(p.id,"initial",ev.target.value)}/></td>
                  <td><input type="number" value={e.entree===0?"":e.entree} placeholder="0" onChange={ev=>update(p.id,"entree",ev.target.value)}/></td>
                  <td>{total}</td>
                  <td><input type="number" value={e.reste===0?"":e.reste} placeholder="0" onChange={ev=>update(p.id,"reste",ev.target.value)}/></td>
                  <td>{vente}</td>
                  <td>{fmtFCFA(venteF)}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr><td colSpan="6">Total {zone}</td><td>{fmtFCFA(totalVenteF)}</td></tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : CLOTURE JOURNALIERE
   ===================================================================== */
function ClotureModule({state, patchState, currentUser, journee}){
  const cloture = state.clotures[journee] || {
    depenseTerrasse:0, depenseBar:0, depenseCave:0,
    recetteTerrasse:0, recetteBar:0, recetteCave:0,
    versementTerrasse:0, versementBar:0, versementCave:0,
    creditHomme:0, creditFemme:0, cloturePar:"", cloture:false
  };

  const set = (field,val)=>{
    patchState(draft=>{
      if(!draft.clotures[journee]) draft.clotures[journee] = {...cloture};
      draft.clotures[journee][field] = field.startsWith("cloture")&&typeof val!=="number" ? val : Number(val)||0;
      queueWrite("clotures", journee, draft.clotures[journee]);
    });
  };

  const totalDepense = (cloture.depenseTerrasse||0)+(cloture.depenseBar||0)+(cloture.depenseCave||0);
  const totalRecette = (cloture.recetteTerrasse||0)+(cloture.recetteBar||0)+(cloture.recetteCave||0);
  const totalVersement = (cloture.versementTerrasse||0)+(cloture.versementBar||0)+(cloture.versementCave||0);
  const totalCredit = (cloture.creditHomme||0)+(cloture.creditFemme||0);

  const finaliser = ()=>{
    patchState(draft=>{
      draft.clotures[journee] = {...draft.clotures[journee], cloture:true, cloturePar: currentUser.nom, timestamp: Date.now()};
      queueWrite("clotures", journee, draft.clotures[journee]);
    });
    alert("Clôture enregistrée pour la journée du " + formatDateFR(journee));
  };

  const champ = (label, field) => (
    <div className="field">
      <label>{label}</label>
      <input type="number" value={cloture[field]||""} placeholder="0"
        disabled={cloture.cloture}
        onChange={e=>set(field, e.target.value)} />
    </div>
  );

  return (
    <div>
      <div className="journee-badge">📅 Journée comptable : {formatDateFR(journee)}
        {cloture.cloture && <span style={{color:"var(--green)"}}> • Clôturée par {cloture.cloturePar}</span>}
      </div>

      <div className="card">
        <h3>Dépenses</h3>
        {champ("Dépense Terrasse","depenseTerrasse")}
        {champ("Dépense Bar","depenseBar")}
        {champ("Dépense Cave à vin","depenseCave")}
        <div className="row between"><b>Total dépense</b><b>{fmtFCFA(totalDepense)}</b></div>
      </div>

      <div className="card">
        <h3>Recettes</h3>
        {champ("Recette Terrasse","recetteTerrasse")}
        {champ("Recette Bar","recetteBar")}
        {champ("Recette Cave à vin","recetteCave")}
        <div className="row between"><b>Total recette</b><b>{fmtFCFA(totalRecette)}</b></div>
      </div>

      <div className="card">
        <h3>Versements</h3>
        {champ("Versement Terrasse","versementTerrasse")}
        {champ("Versement Bar","versementBar")}
        {champ("Versement Cave à vin","versementCave")}
        <div className="row between"><b>Total versement</b><b>{fmtFCFA(totalVersement)}</b></div>
      </div>

      <div className="card">
        <h3>Crédits</h3>
        {champ("Crédit homme","creditHomme")}
        {champ("Crédit femme","creditFemme")}
        <div className="row between"><b>Total crédit</b><b>{fmtFCFA(totalCredit)}</b></div>
      </div>

      <div className="card">
        <h3>Récapitulatif</h3>

/* =====================================================================
   MODULE : REAPPROVISIONNEMENT / AJUSTEMENT DE STOCK (gérant + propriétaire)
   ===================================================================== */
function ReapproModule({state, patchState, currentUser}){
  const [zone,setZone] = useState("bar");
  const [modeAjustement,setModeAjustement] = useState(null); // id produit en cours d'édition
  const [qte,setQte] = useState("");
  const [prixAchat,setPrixAchat] = useState("");
  const [nouveauStock,setNouveauStock] = useState("");
  const [raison,setRaison] = useState("");

  const produits = state.produits.filter(p=>p.zone===zone);

  const ouvrirReappro = (p)=>{
    setModeAjustement({id:p.id, type:"reappro"});
    setQte(""); setPrixAchat(p.prixAchat || "");
  };
  const ouvrirAjustement = (p)=>{
    setModeAjustement({id:p.id, type:"ajustement"});
    setNouveauStock(p.stock || 0); setRaison("");
  };
  const fermer = ()=> setModeAjustement(null);

  const confirmerReappro = (p)=>{
    const q = Number(qte);
    if(!q || q<=0){ alert("Quantité invalide"); return; }
    const achat = Number(prixAchat)||0;
    const avant = p.stock||0;
    const mouvement = {
      id: uid(), produitId:p.id, produitNom:p.nom, zone:p.zone, type:"reappro",
      quantite:q, avant, apres: avant+q, prixAchat: achat, cout: achat*q,
      auteur: currentUser.nom, date: new Date().toLocaleString('fr-FR'), timestamp: Date.now()
    };
    patchState(draft=>{
      const prod = draft.produits.find(x=>x.id===p.id);
      if(prod){
        prod.stock = (prod.stock||0)+q; if(achat>0) prod.prixAchat = achat;
        queueWrite("produits", prod.id, prod);
      }
      if(!draft.mouvements) draft.mouvements = [];
      draft.mouvements.push(mouvement);
    });
    queueWrite("mouvements", mouvement.id, mouvement);
    fermer();
  };

  const confirmerAjustement = (p)=>{
    const n = Number(nouveauStock);
    if(n<0 || isNaN(n)){ alert("Valeur invalide"); return; }
    const avant = p.stock||0;
    const mouvement = {
      id: uid(), produitId:p.id, produitNom:p.nom, zone:p.zone, type:"ajustement",
      quantite: n-avant, avant, apres:n, raison: raison||"Correction inventaire",
      auteur: currentUser.nom, date: new Date().toLocaleString('fr-FR'), timestamp: Date.now()
    };
    patchState(draft=>{
      const prod = draft.produits.find(x=>x.id===p.id);
      if(prod){
        prod.stock = n;
        queueWrite("produits", prod.id, prod);
      }
      if(!draft.mouvements) draft.mouvements = [];
      draft.mouvements.push(mouvement);
    });
    queueWrite("mouvements", mouvement.id, mouvement);
    fermer();
  };

  const mouvementsRecents = (state.mouvements||[]).slice().sort((a,b)=>b.timestamp-a.timestamp).slice(0,15);

  return (
    <div>
      <div className="zone-toggle">
        {["bar","terrasse","liqueur"].map(z=>(
          <button key={z} className={zone===z?"active":""} onClick={()=>setZone(z)}>
            {z==="bar"?"Bar":z==="terrasse"?"Terrasse":"Liqueur/Cave"}
          </button>
        ))}
      </div>

      <div className="card">
        <h3>Stock actuel — {zone}</h3>
        {produits.length===0 ? <div className="empty">Aucun produit</div> :
          produits.map(p=>(
            <div key={p.id}>
              <div className="list-item">
                <div>
                  <div>{p.nom} {(p.stock||0)<=(p.seuilAlerte||5) && <span className="pill" style={{background:"#3a1212", color:"var(--red)"}}>Stock bas</span>}</div>
                  <div className="meta">Stock : {p.stock||0} • Achat : {fmtFCFA(p.prixAchat||0)}</div>
                </div>
                <div className="row" style={{gap:6}}>
                  <button className="btn sm secondary" onClick={()=>ouvrirReappro(p)}>+ Réappro</button>
                  <button className="btn sm secondary" onClick={()=>ouvrirAjustement(p)}>Ajuster</button>
                </div>
              </div>

              {modeAjustement && modeAjustement.id===p.id && modeAjustement.type==="reappro" && (
                <div className="card" style={{background:"var(--bg3)"}}>
                  <div className="field"><label>Quantité reçue</label>
                    <input type="number" value={qte} placeholder="0" onChange={e=>setQte(e.target.value)} />
                  </div>
                  <div className="field"><label>Prix d'achat unitaire (F CFA)</label>
                    <input type="number" value={prixAchat} placeholder="0" onChange={e=>setPrixAchat(e.target.value)} />
                  </div>
                  {qte && prixAchat && (
                    <div className="row between" style={{marginBottom:10, fontSize:13}}>
                      <span>Coût total</span><b>{fmtFCFA(Number(qte)*Number(prixAchat))}</b>
                    </div>
                  )}
                  <div className="row" style={{gap:8}}>
                    <button className="btn secondary" onClick={fermer}>Annuler</button>
                    <button className="btn" onClick={()=>confirmerReappro(p)}>Confirmer</button>
                  </div>
                </div>
              )}

              {modeAjustement && modeAjustement.id===p.id && modeAjustement.type==="ajustement" && (
                <div className="card" style={{background:"var(--bg3)"}}>
                  <div className="field"><label>Stock réel constaté</label>
                    <input type="number" value={nouveauStock} onChange={e=>setNouveauStock(e.target.value)} />
                  </div>
                  <div className="field"><label>Raison (optionnel)</label>
                    <input value={raison} placeholder="Ex : casse, inventaire physique..." onChange={e=>setRaison(e.target.value)} />
                  </div>
                  <div className="row" style={{gap:8}}>
                    <button className="btn secondary" onClick={fermer}>Annuler</button>
                    <button className="btn" onClick={()=>confirmerAjustement(p)}>Confirmer</button>
                  </div>
                </div>
              )}
            </div>
          ))
        }
      </div>

      <div className="card">
        <h3>Derniers mouvements</h3>
        {mouvementsRecents.length===0 ? <div className="empty">Aucun mouvement enregistré</div> :
          mouvementsRecents.map(m=>(
            <div className="list-item" key={m.id}>
              <div>
                <div>{m.produitNom} <span className="meta">({m.type==="reappro"?"réappro":"ajustement"})</span></div>
                <div className="meta">{m.avant} → {m.apres} • {m.auteur} • {m.date}</div>
              </div>
              <b style={{color: m.apres>=m.avant?"var(--green)":"var(--red)"}}>
                {m.apres>=m.avant?"+":""}{m.apres-m.avant}
              </b>
            </div>
          ))
        }
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : DETTES / CREDIT CLIENT
   ===================================================================== */
function DettesModule({state, patchState, settings}){
  const [search,setSearch] = useState("");
  const [apercuImpression,setApercuImpression] = useState(false);

  const ventesCredit = (state.ventes||[]).filter(v=>v.credit);
  const marquerPaye = (venteId)=>{
    patchState(draft=>{
      const v = draft.ventes.find(x=>x.id===venteId);
      if(v){ v.paye = true; queueWrite("ventes", v.id, v); }
    });
  };
  const soldeTout = (client)=>{
    if(!confirm("Marquer toutes les dettes de "+client+" comme payées ?")) return;
    patchState(draft=>{
      draft.ventes.filter(v=>v.credit && v.clientCredit===client && !v.paye).forEach(v=>{
        v.paye = true;
        queueWrite("ventes", v.id, v);
      });
    });
  };

  const parClient = {};
  ventesCredit.forEach(v=>{
    const c = v.clientCredit || "Client inconnu";
    if(!parClient[c]) parClient[c] = {impaye:0, paye:0, ventes:[]};
    parClient[c][v.paye ? "paye" : "impaye"] += v.total;
    parClient[c].ventes.push(v);
  });

  const clients = Object.entries(parClient)
    .filter(([nom])=> nom.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=> b[1].impaye - a[1].impaye);

  const totalDetteGlobale = clients.reduce((s,[,d])=>s+d.impaye,0);

  return (
    <div>
      <div className="card">
        <h3>💳 Total des dettes en cours</h3>
        <div className="kpi-value" style={{color: totalDetteGlobale>0 ? "var(--red)" : "var(--green)"}}>
          {fmtFCFA(totalDetteGlobale)}
        </div>
        <button className="btn secondary sm" style={{marginTop:8}} onClick={()=>setApercuImpression(a=>!a)}>
          🖨️ {apercuImpression ? "Masquer l'aperçu" : "Imprimer le relevé complet"}
        </button>
      </div>

      {apercuImpression && (
        <div className="card">
          <CreancesPrintable
            titre="RELEVÉ GLOBAL DES CRÉANCES"
            settings={settings || {}}
            lignes={clients.flatMap(([nom,d])=> d.ventes.filter(v=>!v.paye).map(v=>({
              nom, telephone: v.clientTelephone, caissier: v.caissierNom, motif: v.clientMotif,
              date: v.date, statut:"Impayé", montant: v.total
            })))}
          />
          <button className="btn" style={{marginTop:10}} onClick={printNow}>🌐 Lancer l'impression</button>
        </div>
      )}

      <div className="search-bar">
        <input placeholder="🔍 Rechercher un client..." value={search} onChange={e=>setSearch(e.target.value)} />
      </div>

      {clients.length===0 ? <div className="empty">Aucune vente à crédit enregistrée</div> :
        clients.map(([nom, d])=>(
          <div className="card" key={nom}>
            <div className="row between" style={{marginBottom:8}}>
              <h3 style={{margin:0}}>{nom}</h3>
              {d.impaye>0 && <button className="btn sm secondary" onClick={()=>soldeTout(nom)}>Solder tout</button>}
            </div>
            <div className="row between" style={{marginBottom:8}}>
              <span>Dette en cours</span>
              <b style={{color: d.impaye>0 ? "var(--red)":"var(--green)"}}>{fmtFCFA(d.impaye)}</b>
            </div>
            {d.paye>0 && (
              <div className="row between" style={{marginBottom:8, fontSize:12, color:"var(--text-dim)"}}>
                <span>Déjà réglé</span><span>{fmtFCFA(d.paye)}</span>
              </div>
            )}
            {d.ventes.sort((a,b)=>b.timestamp-a.timestamp).map(v=>(
              <div className="list-item" key={v.id}>
                <div>
                  <div>{fmtFCFA(v.total)} • <span className={v.paye?"pill gerant":"pill"} style={!v.paye?{background:"#3a1212", color:"var(--red)"}:{}}>{v.paye?"Payé":"Impayé"}</span></div>
                  <div className="meta">{v.date} • {v.caissierNom}</div>
                  {v.clientTelephone && <div className="meta">📞 {v.clientTelephone}</div>}
                  {v.clientMotif && <div className="meta">Motif : {v.clientMotif}</div>}
                  <div className="meta">{v.items.map(i=>i.nom+" ×"+i.qte).join(", ")}</div>
                </div>
                {!v.paye && <button className="btn sm secondary" onClick={()=>marquerPaye(v.id)}>Marquer payé</button>}
              </div>
            ))}
          </div>
        ))
      }
    </div>
  );
}

/* =====================================================================
   MODULE : MES VENTES (caissier — CA personnel, réimpression, annulation)
   ===================================================================== */
function MesVentesModule({state, patchState, currentUser, journee, settings}){
  const [dateFiltre,setDateFiltre] = useState(journee);
  const [printing,setPrinting] = useState(null);
  const [connecte,setConnecte] = useState(!!blePrinterRef.characteristic);
  const [busy,setBusy] = useState(false);

  const mesVentes = (state.ventes||[])
    .filter(v=>v.caissierId===currentUser.id && v.journee===dateFiltre)
    .sort((a,b)=>b.timestamp-a.timestamp);

  const ventesValides = mesVentes.filter(v=>!v.annulee);
  const totalCA = ventesValides.reduce((s,v)=>s+v.total,0);
  const nbAnnulees = mesVentes.filter(v=>v.annulee).length;

  const annuler = (venteId)=>{
    const raison = prompt("Justificatif obligatoire — pourquoi annuler cette vente ?");
    if(!raison || !raison.trim()){ alert("Annulation refusée : un justificatif est requis."); return; }
    patchState(draft=>{
      const v = draft.ventes.find(x=>x.id===venteId);
      if(v && !v.annulee){
        v.annulee = true;
        v.raisonAnnulation = raison.trim();
        v.items.forEach(it=>{
          const p = draft.produits.find(x=>x.id===it.prodId);
          if(p){
            p.stock = (p.stock||0) + it.qte;
            queueWrite("produits", p.id, p);
          }
        });
        queueWrite("ventes", v.id, v);
      }
    });
  };

  const connecter = async ()=>{
    setBusy(true);
    const ok = await connecterImprimanteBLE();
    setConnecte(ok);
    setBusy(false);
  };

  const reimprimer = async (largeur)=>{
    setBusy(true);
    const lignes = ticketLignesVente(printing, settings);
    const ok = await imprimerTicketBLE(lignes, largeur, settings);
    setBusy(false);
    if(ok) alert("✅ Ticket réimprimé !");
  };

  return (
    <div>
      {printing && (
        <div style={{position:"fixed", inset:0, background:"#000c", zIndex:50, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12, padding:20}}>
          <Ticket data={printing} type="vente" settings={settings} />
          <div className="printer-bar" style={{width:280}}>
            <span className={connecte?"status-on":"status-off"}>{connecte?"🖨️ Connectée":"❌ Non connectée"}</span>
            {!connecte && <button className="btn sm secondary" disabled={busy} onClick={connecter}>Connecter</button>}
          </div>
          <div className="row" style={{width:280, flexWrap:"wrap", gap:8}}>
            <button className="btn ble" disabled={busy} onClick={()=>reimprimer(80)}>🖨️ BLE 80mm</button>
            <button className="btn ble" disabled={busy} onClick={()=>reimprimer(57)}>🖨️ BLE 57mm</button>
          </div>
          <div className="row" style={{width:280}}>
            <button className="btn secondary" onClick={printNow}>🌐 Navigateur</button>
            <button className="btn secondary" onClick={()=>setPrinting(null)}>Fermer</button>
          </div>
        </div>
      )}

      <div className="field">
        <label>Date</label>
        <input type="date" value={dateFiltre} onChange={e=>setDateFiltre(e.target.value)} />
      </div>

      <div className="kpi-grid">
        <div className="kpi-card">
          <span className="kpi-label">Mon CA</span>
          <span className="kpi-value">{fmtFCFA(totalCA)}</span>
          <span className="kpi-sub">{ventesValides.length} vente{ventesValides.length>1?"s":""}</span>
        </div>
        <div className="kpi-card">
          <span className="kpi-label">Annulations</span>
          <span className="kpi-value" style={{color: nbAnnulees>0?"var(--red)":"var(--gold)"}}>{nbAnnulees}</span>
        </div>
      </div>

      <div className="card">
        <h3>Mes ventes — {formatDateFR(dateFiltre)}</h3>
        {mesVentes.length===0 ? <div className="empty">Aucune vente ce jour</div> :
          mesVentes.map(v=>(
            <div className="list-item" key={v.id} style={{flexWrap:"wrap"}}>
              <div>
                <div>
                  {fmtFCFA(v.total)} <span style={{textTransform:"capitalize", color:"var(--text-dim)", fontSize:11}}>({v.zone})</span>
                  {v.annulee && <span className="pill" style={{background:"#3a1212", color:"var(--red)", marginLeft:6}}>Annulée</span>}
                </div>
                <div className="meta">{v.date}</div>
                <div className="meta">{v.items.map(i=>i.nom+" ×"+i.qte).join(", ")}</div>
                {v.annulee && v.raisonAnnulation && <div className="meta" style={{color:"var(--red)"}}>Motif : {v.raisonAnnulation}</div>}
              </div>
              {!v.annulee && (
                <div className="row" style={{gap:6, marginTop:6}}>
                  <button className="btn sm secondary" onClick={()=>setPrinting(v)}>🖨️ Réimprimer</button>
                  <button className="btn sm danger" onClick={()=>annuler(v.id)}>Annuler</button>
                </div>
              )}
            </div>
          ))
        }
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : AVOIRS

function AvoirsModule({state, patchState, currentUser, journee, settings}){

  const creerAvoir = ()=>{
    if(!form.montant || Number(form.montant)<=0){ alert("Montant invalide"); return; }
    const avoir = {
      id: uid(),
      etablissement: form.etablissement,
      montant: Number(form.montant),
      caissierNom: form.caissierNom,
      caissierId: currentUser.id,
      date: new Date().toLocaleString('fr-FR'),
      journee,
      numero: "AV-" + Date.now().toString().slice(-6),
      imprime:false
    };
