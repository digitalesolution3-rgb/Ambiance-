    queueWrite("avoirs", avoir.id, avoir);
    setForm({...form, montant:""});
    setPrinting(avoir);
  };

  const marquerImprime = (id)=>{
    patchState(draft=>{
      const a = draft.avoirs.find(x=>x.id===id);
      if(a){ a.imprime = true; queueWrite("avoirs", a.id, a); }
    });
  };

  const connecter = async ()=>{
    setBusy(true);
    const ok = await connecterImprimanteBLE();
    setConnecte(ok);
    setBusy(false);
  };

  const imprimerBLE = async (largeur)=>{
    setBusy(true);
    const lignes = ticketLignesAvoir(printing, settings);
    await imprimerTicketBLE(lignes, largeur, settings);
    marquerImprime(printing.id);
    setBusy(false);
  };

  const resultats = state.avoirs
    .filter(a => a.caissierNom.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=> b.id.localeCompare(a.id));

  return (
    <div>
      {printing && (
        <div style={{position:"fixed", inset:0, background:"#000c", zIndex:50, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12, padding:20}}>
          <Ticket data={printing} type="avoir" settings={settings} />
          <div className="printer-bar" style={{width:280}}>
            <span className={connecte?"status-on":"status-off"}>{connecte?"🖨️ Connectée":"❌ Non connectée"}</span>
            {!connecte && <button className="btn sm secondary" disabled={busy} onClick={connecter}>Connecter</button>}
          </div>
          <div className="row" style={{width:280, flexWrap:"wrap", gap:8}}>
            {connecte && <button className="btn ble" disabled={busy} onClick={()=>imprimerBLE(80)}>🖨️ BLE 80mm</button>}
            {connecte && <button className="btn ble" disabled={busy} onClick={()=>imprimerBLE(57)}>🖨️ BLE 57mm</button>}
          </div>
          <div className="row" style={{width:280}}>
            <button className="btn secondary" onClick={()=>{printNow(); marquerImprime(printing.id);}}>🌐 Navigateur</button>
            <button className="btn secondary" onClick={()=>setPrinting(null)}>Fermer</button>
          </div>
        </div>
      )}

      <div className="card">
        <h3>Nouvel avoir</h3>
        <div className="field">
          <label>Nom de l'établissement</label>
          <input value={form.etablissement} onChange={e=>setForm({...form,etablissement:e.target.value})}/>
        </div>
        <div className="field">
          <label>Montant de l'avoir</label>
          <input type="number" value={form.montant} placeholder="0" onChange={e=>setForm({...form,montant:e.target.value})}/>
        </div>
        <div className="field">
          <label>Caissier ayant livré l'avoir</label>
          <input value={form.caissierNom} onChange={e=>setForm({...form,caissierNom:e.target.value})}/>
        </div>
        <button className="btn" onClick={creerAvoir}>Enregistrer et imprimer</button>
      </div>

      <div className="card">
        <h3>Retrouver un avoir (par caissier)</h3>
        <div className="search-bar">
          <input placeholder="Nom du caissier..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        {resultats.length===0 ? (
          <div className="empty">Aucun avoir trouvé</div>
        ) : resultats.map(a=>(
          <div className="list-item" key={a.id}>
            <div>
              <div>{fmtFCFA(a.montant)} — <b>{a.caissierNom}</b></div>
              <div className="meta">{a.numero} • {a.date}</div>
            </div>
            <button className="btn sm secondary" onClick={()=>setPrinting(a)}>Voir / Imprimer</button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : SUIVI DES VENTES (gérant + propriétaire)
   ===================================================================== */
const NOMS_JOURS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
function joursSemaine(lundi){
  const arr=[];
  const d = new Date(lundi+"T00:00:00");
  for(let i=0;i<7;i++){
    const cur = new Date(d); cur.setDate(d.getDate()+i);
    arr.push(cur.toISOString().slice(0,10));
  }
  return arr;
}

/* =====================================================================
   MODULE : CLASSEMENT CAISSIERS + REGISTRE DES ANNULATIONS (gérant/owner)
   ===================================================================== */
const SEUIL_TAUX_ANNULATION = 20; // % au-delà duquel on alerte le gérant

function ClassementModule({state, settings}){
  const [periode,setPeriode] = useState("mois"); // "semaine" | "mois"
  const [ref,setRef] = useState(new Date().toISOString().slice(0,10));

  const toutesVentes = state.ventes || [];

  let ventesPeriode;
  let labelPeriode;
  if(periode==="semaine"){
    const { debut, fin } = semaineDe(ref);
    ventesPeriode = toutesVentes.filter(v=>v.journee>=debut && v.journee<=fin);
    labelPeriode = "Semaine du "+formatDateFR(debut);
  } else {
    const mois = moisDe(ref);
    ventesPeriode = toutesVentes.filter(v=>moisDe(v.journee)===mois);
    labelPeriode = "Mois de "+new Date(mois+"-01T00:00:00").toLocaleDateString('fr-FR',{month:'long', year:'numeric'});
  }

  const parCaissier = {};
  ventesPeriode.forEach(v=>{
    const c = v.caissierNom || "Inconnu";
    if(!parCaissier[c]) parCaissier[c] = {ca:0, nbVentes:0, nbAnnul:0, credits:0};
    if(v.annulee){
      parCaissier[c].nbAnnul += 1;
    } else {
      parCaissier[c].ca += v.total;
      parCaissier[c].nbVentes += 1;
      if(v.credit) parCaissier[c].credits += v.total;
    }
  });

  const classement = Object.entries(parCaissier).map(([nom,d])=>{
    const totalActes = d.nbVentes + d.nbAnnul;
    const tauxAnnul = totalActes>0 ? Math.round((d.nbAnnul/totalActes)*100) : 0;
    return {nom, ...d, tauxAnnul};
  }).sort((a,b)=>b.ca-a.ca);

  const annulationsPeriode = ventesPeriode.filter(v=>v.annulee).sort((a,b)=>b.timestamp-a.timestamp);

  // ---- Fidélité clients (toutes périodes confondues, identifiés par téléphone) ----
  const seuilFidelite = (settings && settings.fideliteSeuil) || 10;
  const parClientFidelite = {};
  toutesVentes.filter(v=>!v.annulee).forEach(v=>{
    const tel = v.clientTelephone || v.clientFideliteTelephone;
    if(!tel) return;
    const nom = v.clientCredit || v.clientFideliteNom || "Client";
    if(!parClientFidelite[tel]) parClientFidelite[tel] = {nom, tel, visites:0, total:0};
    parClientFidelite[tel].visites += 1;
    parClientFidelite[tel].total += v.total;
  });
  const clientsFideles = Object.values(parClientFidelite).sort((a,b)=>b.visites-a.visites);

  return (
    <div>
      <div className="zone-toggle">
        <button className={periode==="semaine"?"active":""} onClick={()=>setPeriode("semaine")}>Semaine</button>
        <button className={periode==="mois"?"active":""} onClick={()=>setPeriode("mois")}>Mois</button>
      </div>
      <div className="field">
        <label>Date de référence</label>
        <input type="date" value={ref} onChange={e=>setRef(e.target.value)} />
      </div>

      <div className="card">
        <h3>🏆 Classement — {labelPeriode}</h3>
        {classement.length===0 ? <div className="empty">Aucune vente sur cette période</div> :
          classement.map((c,i)=>(
            <div className="list-item" key={c.nom}>
              <div>
                <div>{i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1)+"."} <b>{c.nom}</b></div>
                <div className="meta">{c.nbVentes} vente{c.nbVentes>1?"s":""} • Crédits accordés : {fmtFCFA(c.credits)}</div>
                <div className="meta" style={c.tauxAnnul>SEUIL_TAUX_ANNULATION?{color:"var(--red)", fontWeight:700}:{}}>
                  {c.nbAnnul} annulation{c.nbAnnul>1?"s":""} ({c.tauxAnnul}%) {c.tauxAnnul>SEUIL_TAUX_ANNULATION && "⚠️ Taux anormalement élevé"}
                </div>
              </div>
              <b className="gold">{fmtFCFA(c.ca)}</b>
            </div>
          ))
        }
      </div>

      <div className="card">
        <h3>🗑️ Registre des annulations — {labelPeriode}</h3>
        {annulationsPeriode.length===0 ? <div className="empty">Aucune annulation sur cette période</div> :
          annulationsPeriode.map(v=>(
            <div className="list-item" key={v.id}>
              <div>
                <div>{fmtFCFA(v.total)} • {v.caissierNom}</div>
                <div className="meta">{v.date}</div>
                <div className="meta">Motif : {v.raisonAnnulation || "(non renseigné)"}</div>
              </div>
            </div>
          ))
        }
      </div>

      <div className="card">
        <h3>🎁 Fidélité clients</h3>
        <p style={{fontSize:11, color:"var(--text-dim)", marginBottom:8}}>
          Offre due tous les {seuilFidelite} achats (historique complet, tous les clients identifiés par téléphone).
        </p>
        {clientsFideles.length===0 ? <div className="empty">Aucun client identifié pour l'instant</div> :
          clientsFideles.slice(0,20).map(c=>{
            const eligible = c.visites>0 && c.visites % seuilFidelite === 0;
            return (
              <div className="list-item" key={c.tel}>
                <div>
                  <div>{c.nom} {eligible && <span className="pill gerant">🎁 Offre due</span>}</div>
                  <div className="meta">📞 {c.tel} • {c.visites} achat{c.visites>1?"s":""}</div>
                </div>
                <b>{fmtFCFA(c.total)}</b>
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : VENTES (gérant/owner — filtres, réimpression, annulation)
   ===================================================================== */
function VentesModule({state, patchState, journee}){
  const [vue,setVue] = useState("jour"); // "jour" | "semaine"
  const [filterJournee, setFilterJournee] = useState(journee);
  const [filterCaissier, setFilterCaissier] = useState("");
  const [filterZone, setFilterZone] = useState("");
  const [semaineRef, setSemaineRef] = useState(journee);

  const toutesVentes = state.ventes || [];
  const caissiers = [...new Set(toutesVentes.map(v=>v.caissierNom))];

  const annuler = (venteId)=>{
    const raison = prompt("Justificatif obligatoire — pourquoi annuler cette vente ?");
    if(!raison || !raison.trim()){ alert("Annulation refusée : un justificatif est requis."); return; }
    patchState(draft=>{
      const v = draft.ventes.find(x=>x.id===venteId);
      if(v && !v.annulee){
        v.annulee = true;
        v.raisonAnnulation = raison.trim();
        v.items.forEach(it=>{
          const p = draft.produits.find(x=>x.id===it.prodId);
          if(p){
            p.stock = (p.stock||0) + it.qte;
            queueWrite("produits", p.id, p);
          }
        });
        queueWrite("ventes", v.id, v);
      }
    });
  };

  const ventes = toutesVentes.filter(v=>
    v.journee===filterJournee && !v.annulee &&
    (filterCaissier? v.caissierNom===filterCaissier : true) &&
    (filterZone? v.zone===filterZone : true)
  ).sort((a,b)=>b.timestamp-a.timestamp);
  const ventesAnnuleesJour = toutesVentes.filter(v=>v.journee===filterJournee && v.annulee);

  const totalJour = ventes.reduce((s,v)=>s+v.total,0);
  const parCaissier = {};
  ventes.forEach(v=>{ parCaissier[v.caissierNom] = (parCaissier[v.caissierNom]||0) + v.total; });

  // ---- Vue semaine ----
  const { debut: lundiSemaine } = semaineDe(semaineRef);
  const jours = joursSemaine(lundiSemaine);
  const donneesJours = jours.map((jourIso, i)=>{
    const ventesJ = toutesVentes.filter(v=>v.journee===jourIso && !v.annulee);
    const annulJ = toutesVentes.filter(v=>v.journee===jourIso && v.annulee).length;
    const { ca, marge } = calculerCAEtMarge(ventesJ);
    const cl = state.clotures[jourIso];
    const depense = cl ? (cl.depenseTerrasse||0)+(cl.depenseBar||0)+(cl.depenseCave||0) : 0;
    return { jourIso, nom: NOMS_JOURS[i], ca, marge, depense, net: marge-depense, nbVentes: ventesJ.length, annulations: annulJ, estAujourdhui: jourIso===journee, sansDonnees: ventesJ.length===0 && annulJ===0 };
  });
  const totalSemaineCA = donneesJours.reduce((s,j)=>s+j.ca,0);
  const totalSemaineMarge = donneesJours.reduce((s,j)=>s+j.marge,0);
  const totalSemaineDepense = donneesJours.reduce((s,j)=>s+j.depense,0);
  const totalSemaineVentes = donneesJours.reduce((s,j)=>s+j.nbVentes,0);
  const totalSemaineAnnul = donneesJours.reduce((s,j)=>s+j.annulations,0);
  const beneficeNetSemaine = totalSemaineMarge - totalSemaineDepense;

  const changerSemaine = (delta)=>{
    const d = new Date(lundiSemaine+"T00:00:00");
    d.setDate(d.getDate()+delta*7);
    setSemaineRef(d.toISOString().slice(0,10));
  };

  return (
    <div>
      <div className="zone-toggle">
        <button className={vue==="jour"?"active":""} onClick={()=>setVue("jour")}>Jour</button>
        <button className={vue==="semaine"?"active":""} onClick={()=>setVue("semaine")}>Semaine</button>
      </div>

      {vue==="jour" && (
        <>
          <div className="journee-badge">📅 {formatDateFR(filterJournee)}</div>

          <div className="card">
            <h3>Filtres</h3>
            <div className="field">
              <label>Journée comptable</label>
              <input type="date" value={filterJournee} onChange={e=>setFilterJournee(e.target.value)} />
            </div>
            <div className="field">
              <label>Caissier</label>
              <select value={filterCaissier} onChange={e=>setFilterCaissier(e.target.value)}>
                <option value="">Tous les caissiers</option>
                {caissiers.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Zone</label>
              <select value={filterZone} onChange={e=>setFilterZone(e.target.value)}>
                <option value="">Toutes les zones</option>
                <option value="bar">Bar</option>
                <option value="terrasse">Terrasse</option>
                <option value="liqueur">Liqueur / Cave</option>
              </select>
            </div>
          </div>

          <div className="card">
            <h3>Résumé par caissier</h3>
            {Object.keys(parCaissier).length===0 ? <div className="empty">Aucune vente pour ce filtre</div> :
              Object.entries(parCaissier).map(([nom,total])=>(
                <div className="list-item" key={nom}>
                  <span>{nom}</span><b>{fmtFCFA(total)}</b>
                </div>
              ))
            }
            <div className="row between" style={{marginTop:8, paddingTop:8, borderTop:"1px solid var(--border)"}}>
              <b>Total journée</b><b style={{color:"var(--gold)"}}>{fmtFCFA(totalJour)}</b>
            </div>
            {ventesAnnuleesJour.length>0 && (
              <div className="row between" style={{fontSize:12, color:"var(--red)", marginTop:4}}>
                <span>Annulations</span><span>{ventesAnnuleesJour.length}</span>
              </div>
            )}
          </div>

          <div className="card">
            <h3>Détail des ventes ({ventes.length})</h3>
            {ventes.length===0 ? <div className="empty">Aucune vente enregistrée</div> :
              ventes.map(v=>(
                <div className="list-item" key={v.id}>
                  <div>
                    <div>{v.caissierNom} — <span style={{textTransform:"capitalize"}}>{v.zone}</span></div>
                    <div className="meta">{v.date}</div>
                    <div className="meta">{v.items.map(i=>i.nom+" ×"+i.qte).join(", ")}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <b>{fmtFCFA(v.total)}</b><br/>
                    <button className="btn sm danger" style={{marginTop:4}} onClick={()=>annuler(v.id)}>Annuler</button>
                  </div>
                </div>
              ))
            }
          </div>
        </>
      )}

      {vue==="semaine" && (
        <>
          <div className="row between" style={{marginBottom:10}}>
            <button className="btn sm secondary" onClick={()=>changerSemaine(-1)}>← Semaine préc.</button>
            <button className="btn sm secondary" onClick={()=>changerSemaine(1)}>Semaine suiv. →</button>
          </div>
          <div className="journee-badge">📆 Du {formatDateFR(jours[0])} au {formatDateFR(jours[6])}</div>

          {donneesJours.map(j=>(
            <div className="card" key={j.jourIso}>
              <div className="row between">
                <span>{j.nom} {j.estAujourdhui && <span className="pill owner">AUJOURD'HUI</span>}</span>
                <b style={{color: j.sansDonnees ? "var(--text-dim)" : "var(--green)"}}>
                  {j.sansDonnees ? "—" : fmtFCFA(j.ca)}
                </b>
              </div>
              {!j.sansDonnees && (
                <div className="meta" style={{marginTop:4}}>
                  🛒 {j.nbVentes} vente{j.nbVentes>1?"s":""}
                  {j.annulations>0 && <span style={{color:"var(--red)"}}> · ❌ {j.annulations} annul.</span>}
                  {(j.marge!==0 || j.depense!==0) && (
                    <> · 💰 Marge {fmtFCFA(j.marge)} · 💸 {fmtFCFA(j.depense)} · 🏆 Net {fmtFCFA(j.net)}</>
                  )}
                </div>
              )}
            </div>
          ))}

          <div className="card" style={{borderColor:"var(--gold)"}}>
            <h3>TOTAL SEMAINE</h3>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
              <div>
                <div className="meta">Chiffre d'affaires</div>
                <div style={{fontSize:18, fontWeight:700, color:"var(--green)"}}>{fmtFCFA(totalSemaineCA)}</div>
              </div>
              <div>
                <div className="meta">Ventes réalisées</div>
                <div style={{fontSize:18, fontWeight:700, color:"var(--blue)"}}>{totalSemaineVentes}</div>
              </div>
              <div>
                <div className="meta">Marge brute</div>
                <div style={{fontSize:18, fontWeight:700}}>{fmtFCFA(totalSemaineMarge)}</div>
              </div>
              <div>
                <div className="meta">Dépenses</div>
                <div style={{fontSize:18, fontWeight:700, color:"var(--red)"}}>{fmtFCFA(totalSemaineDepense)}</div>
              </div>
              <div>
                <div className="meta">🏆 Bénéfice net semaine</div>
                <div style={{fontSize:19, fontWeight:800, color: beneficeNetSemaine>=0?"var(--green)":"var(--red)"}}>{fmtFCFA(beneficeNetSemaine)}</div>
              </div>
              <div>
                <div className="meta">Annulations</div>
                <div style={{fontSize:18, fontWeight:700, color:"var(--red)"}}>{totalSemaineAnnul}</div>
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* =====================================================================
   MODULE : PRODUITS (ajout / édition / suppression — propriétaire)
   ===================================================================== */
function ProduitsModule({state, patchState}){
  const [zone,setZone] = useState("bar");
  const [form,setForm] = useState({nom:"", prix:"", prixAchat:"", stock:""});
  const produits = state.produits.filter(p=>p.zone===zone);

  const ajouter = ()=>{
    if(!form.nom || !form.prix || Number(form.prix)<=0){ alert("Nom et prix de vente valides requis"); return; }
    const p = {
      id: uid(), nom: form.nom, zone,
      prix: Number(form.prix),
      prixAchat: Number(form.prixAchat)||0,
      stock: Number(form.stock)||0,
      seuilAlerte: 5
    };
    patchState(draft=>{ draft.produits.push(p); });
    queueWrite("produits", p.id, p);
    setForm({nom:"", prix:"", prixAchat:"", stock:""});
  };

  const modifierChamp = (id, champ, val)=>{
    patchState(draft=>{
      const p = draft.produits.find(x=>x.id===id);
      if(p){ p[champ] = Number(val)||0; queueWrite("produits", p.id, p); }
    });
  };

  const supprimer = (id)=>{
    if(!confirm("Supprimer ce produit du catalogue ?")) return;
    patchState(draft=>{ draft.produits = draft.produits.filter(p=>p.id!==id); });
    queueDelete("produits", id);
  };

  return (
    <div>
      <div className="zone-toggle">
        {["bar","terrasse","liqueur"].map(z=>(
          <button key={z} className={zone===z?"active":""} onClick={()=>setZone(z)}>
            {z==="bar"?"Bar":z==="terrasse"?"Terrasse":"Liqueur/Cave"}
          </button>
        ))}
      </div>

      <div className="card">
        <h3>Ajouter un produit — {zone}</h3>
        <div className="field"><label>Nom du produit</label>
          <input value={form.nom} onChange={e=>setForm({...form,nom:e.target.value})}/>
        </div>
        <div className="field"><label>Prix de vente (F CFA)</label>
          <input type="number" value={form.prix} placeholder="0" onChange={e=>setForm({...form,prix:e.target.value})}/>
        </div>
        <div className="field"><label>Prix d'achat (F CFA)</label>
          <input type="number" value={form.prixAchat} placeholder="0" onChange={e=>setForm({...form,prixAchat:e.target.value})}/>
        </div>
        <div className="field"><label>Stock initial</label>
          <input type="number" value={form.stock} placeholder="0" onChange={e=>setForm({...form,stock:e.target.value})}/>
        </div>
        <button className="btn" onClick={ajouter}>Ajouter le produit</button>
      </div>

      <div className="card">
        <h3>Catalogue — {zone} ({produits.length})</h3>
        {produits.length===0 ? <div className="empty">Aucun produit dans cette zone</div> :
          produits.map(p=>(
            <div className="list-item" key={p.id} style={{flexWrap:"wrap"}}>
              <div style={{marginBottom:6}}>
                <div>{p.nom} {(p.stock||0)<=(p.seuilAlerte||5) && <span className="pill" style={{background:"#3a1212", color:"var(--red)"}}>Stock bas</span>}</div>
                <div className="meta">Marge unitaire : {fmtFCFA((p.prix||0)-(p.prixAchat||0))}</div>
              </div>
              <div className="row" style={{gap:6, width:"100%", flexWrap:"wrap"}}>
                <div>
                  <label style={{fontSize:10, color:"var(--text-dim)"}}>Vente</label>
                  <input type="number" defaultValue={p.prix}
                    style={{width:78, padding:6, background:"var(--bg3)", border:"1px solid var(--border)", borderRadius:6, color:"var(--text)", textAlign:"right", display:"block"}}
                    onBlur={e=>modifierChamp(p.id,"prix", e.target.value)} />
                </div>
                <div>
                  <label style={{fontSize:10, color:"var(--text-dim)"}}>Achat</label>
                  <input type="number" defaultValue={p.prixAchat||0}
                    style={{width:78, padding:6, background:"var(--bg3)", border:"1px solid var(--border)", borderRadius:6, color:"var(--text)", textAlign:"right", display:"block"}}
                    onBlur={e=>modifierChamp(p.id,"prixAchat", e.target.value)} />
                </div>
                <div>
                  <label style={{fontSize:10, color:"var(--text-dim)"}}>Stock</label>
                  <input type="number" defaultValue={p.stock||0}
                    style={{width:70, padding:6, background:"var(--bg3)", border:"1px solid var(--border)", borderRadius:6, color:"var(--text)", textAlign:"right", display:"block"}}
                    onBlur={e=>modifierChamp(p.id,"stock", e.target.value)} />
                </div>
                <button className="btn sm danger" style={{alignSelf:"flex-end"}} onClick={()=>supprimer(p.id)}>Suppr.</button>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

/* =====================================================================
   MODULE : DASHBOARD / KPI (propriétaire)
   ===================================================================== */
function DashboardModule({state, journee}){
  const toutesVentes = (state.ventes || []).filter(v=>!v.annulee);
  const ventesJour = toutesVentes.filter(v=>v.journee===journee);
  const { ca: caJour } = calculerCAEtMarge(ventesJour);

  const { debut: lundiSemaine, fin: dimancheSemaine } = semaineDe(journee);
  const ventesSemaine = toutesVentes.filter(v=> v.journee>=lundiSemaine && v.journee<=dimancheSemaine);
  const { ca: caSemaine, marge: margeSemaine } = calculerCAEtMarge(ventesSemaine);
  const estDimanche = journee===dimancheSemaine;

  const moisCourant = moisDe(journee);
  const ventesMois = toutesVentes.filter(v=> moisDe(v.journee)===moisCourant);
  const { ca: caMois, marge: margeMois } = calculerCAEtMarge(ventesMois);

  const avoirsJour = (state.avoirs||[]).filter(a=>a.journee===journee);
  const totalAvoirs = avoirsJour.reduce((s,a)=>s+a.montant,0);
  const caissiersActifs = state.users.filter(u=>u.role==="caissier" && u.actif).length;
  const cloture = state.clotures[journee];

  const valeurStock = state.produits.reduce((s,p)=>s+(p.stock||0)*(p.prixAchat||0),0);
  const produitsStockBas = state.produits.filter(p=>(p.stock||0)<=(p.seuilAlerte||5));

  const qtyParProduit = {};
  ventesJour.forEach(v=>v.items.forEach(i=>{ qtyParProduit[i.nom] = (qtyParProduit[i.nom]||0) + i.qte; }));
  const top5 = Object.entries(qtyParProduit).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxQty = top5.length ? top5[0][1] : 1;

  return (
    <div>

        </div>
        <div className="kpi-card">
          <span className="kpi-label">Caissiers actifs</span>
          <span className="kpi-value">{caissiersActifs}</span>
        </div>
        <div className="kpi-card">
          <span className="kpi-label">Statut clôture</span>
          <span className="kpi-value" style={{fontSize:14, color: cloture&&cloture.cloture ? "var(--green)":"var(--red)"}}>

          </span>
        </div>
      </div>

      <div className="card" style={estDimanche ? {borderColor:"var(--gold)"} : {}}>
        <h3>{estDimanche ? "📆 Récapitulatif hebdomadaire (dimanche)" : "Semaine en cours"}</h3>
        <div className="meta" style={{marginBottom:8}}>Du {formatDateFR(lundiSemaine)} au {formatDateFR(dimancheSemaine)}</div>
        <div className="row between"><span>CA global de la semaine</span><b>{fmtFCFA(caSemaine)}</b></div>
        <div className="row between"><span>Marge bénéficiaire</span><b style={{color:"var(--green)"}}>{fmtFCFA(margeSemaine)}</b></div>
      </div>

      <div className="card">
        <h3>CA mensuel</h3>
        <div className="meta" style={{marginBottom:8}}>Mois du {moisCourant}</div>
        <div className="row between"><span>CA global du mois</span><b>{fmtFCFA(caMois)}</b></div>
        <div className="row between"><span>Marge bénéficiaire</span><b style={{color:"var(--green)"}}>{fmtFCFA(margeMois)}</b></div>
      </div>

      <div className="kpi-grid">
        <div className="kpi-card">
          <span className="kpi-label">Valeur du stock</span>
          <span className="kpi-value">{fmtFCFA(valeurStock)}</span>

        </div>
        <div className="kpi-card">
          <span className="kpi-label">Stock bas</span>
          <span className="kpi-value" style={{color: produitsStockBas.length>0 ? "var(--red)":"var(--gold)"}}>{produitsStockBas.length}</span>

      </div>

      <div className="card">
        <h3>Top 5 produits vendus aujourd'hui</h3>

                <div style={{width:(qty/maxQty*100)+"%", background:"var(--gold)", height:8, borderRadius:6}}></div>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function ExportModule({state, settings, journee}){
  const [debut,setDebut] = useState(journee);
  const [fin,setFin] = useState(journee);

  const exporterPeriode = ()=>{
    const ventes = (state.ventes||[]).filter(v=> v.journee>=debut && v.journee<=fin);
    if(ventes.length===0){ alert("Aucune vente sur cette période."); return; }
    exporterVentesCSV(ventes, `ventes_${debut}_a_${fin}.csv`);
  };

  const exporterTout = ()=>{
    if((state.ventes||[]).length===0){ alert("Aucune vente enregistrée."); return; }
    exporterVentesCSV(state.ventes, `ventes_historique_complet.csv`);
  };

  const rapportApercu = genererRapportTexte(journee, state, settings);

  return (
    <div>
      <div className="card">
        <h3>📊 Export des ventes (CSV)</h3>
        <div className="field">
          <label>Période — du</label>
          <input type="date" value={debut} onChange={e=>setDebut(e.target.value)}/>
        </div>
        <div className="field">
          <label>au</label>
          <input type="date" value={fin} onChange={e=>setFin(e.target.value)}/>
        </div>
        <button className="btn" onClick={exporterPeriode}>⬇️ Exporter la période</button>
        <button className="btn secondary" style={{marginTop:8}} onClick={exporterTout}>⬇️ Exporter tout l'historique</button>
        <p style={{fontSize:11, color:"var(--text-dim)", marginTop:8}}>
          Le fichier CSV s'ouvre directement dans Excel ou Google Sheets (une ligne par article vendu).
        </p>
      </div>

      <div className="card">
        <h3>📤 Rapport journalier WhatsApp</h3>
        <p style={{fontSize:12, color:"var(--text-dim)"}}>Aperçu du rapport pour la journée du {formatDateFR(journee)} :</p>
        <div className="ticket" style={{whiteSpace:"pre-wrap", fontSize:12.5}}>{rapportApercu}</div>
        <button className="btn" style={{marginTop:10}} onClick={()=>envoyerRapportWhatsApp(settings.whatsappRapport, rapportApercu)}>
          💬 Envoyer sur WhatsApp
        </button>
        {!settings.whatsappRapport && (
          <p style={{fontSize:11, color:"var(--red)", marginTop:6}}>

}

function RapportMensuelModule({state, settings}){
  const [mois,setMois] = useState(new Date().toISOString().slice(0,7));

  const toutesVentes = state.ventes || [];
  const journeesSet = new Set([
    ...toutesVentes.filter(v=>!v.annulee && moisDe(v.journee)===mois).map(v=>v.journee),
    ...Object.keys(state.clotures||{}).filter(j=>moisDe(j)===mois)
  ]);
  const journees = [...journeesSet].sort();

  const lignesJours = journees.map(j=>{
    const ventesJ = toutesVentes.filter(v=>v.journee===j && !v.annulee);
    const { ca, marge } = calculerCAEtMarge(ventesJ);
    const cl = state.clotures[j];
    const depense = cl ? (cl.depenseTerrasse||0)+(cl.depenseBar||0)+(cl.depenseCave||0) : 0;
    return { jour:j, ca, marge, depense, net: marge-depense };
  });

  const totalCA = lignesJours.reduce((s,l)=>s+l.ca,0);
  const totalDepense = lignesJours.reduce((s,l)=>s+l.depense,0);
  const totalMarge = lignesJours.reduce((s,l)=>s+l.marge,0);
  const totalNet = totalMarge - totalDepense;
  const libelleMois = new Date(mois+"-01T00:00:00").toLocaleDateString('fr-FR',{month:'long', year:'numeric'});

  const genererPDF = ()=>{
    if(!window.jspdf || !window.jspdf.jsPDF){
      alert("Librairie PDF indisponible — vérifie ta connexion internet et réessaie.");
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 16;
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text(settings.nomEtablissement || "BURKINA AMBIANCE", 105, y, {align:"center"}); y+=8;
    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    doc.text("Rapport mensuel — " + libelleMois, 105, y, {align:"center"}); y+=10;

    doc.setFontSize(11);
    doc.text("Chiffre d'affaires : " + fmtFCFA(totalCA), 14, y); y+=7;
    doc.text("Dépenses : " + fmtFCFA(totalDepense), 14, y); y+=7;
    doc.text("Marge brute : " + fmtFCFA(totalMarge), 14, y); y+=7;
    doc.setFont('helvetica','bold');
    doc.text("Bénéfice net : " + fmtFCFA(totalNet), 14, y); y+=10;
    doc.setFont('helvetica','normal');

    doc.setFontSize(10);
    doc.text("Détail journalier", 14, y); y+=6;
    doc.setFontSize(9);
    doc.text("Date", 14, y); doc.text("CA", 80, y); doc.text("Dépenses", 115, y); doc.text("Marge", 155, y); doc.text("Net", 182, y);
    y+=3; doc.line(14,y,196,y); y+=5;
    lignesJours.forEach(l=>{
      if(y>282){ doc.addPage(); y=15; }
      doc.text(l.jour, 14, y);
      doc.text(fmtFCFA(l.ca), 80, y);
      doc.text(fmtFCFA(l.depense), 115, y);
      doc.text(fmtFCFA(l.marge), 155, y);
      doc.text(fmtFCFA(l.net), 182, y);
      y+=5;
    });
    doc.save("rapport-mensuel-"+mois+".pdf");
  };

  return (
    <div>
      <div className="field">
        <label>Mois</label>
        <input type="month" value={mois} onChange={e=>setMois(e.target.value)} />
      </div>
      <div className="card">
        <h3>📊 Résumé — {libelleMois}</h3>
        <div className="row between" style={{marginBottom:6}}><span>Chiffre d'affaires (CA)</span><b>{fmtFCFA(totalCA)}</b></div>
        <div className="row between" style={{marginBottom:6}}><span>Dépenses</span><b style={{color:"var(--red)"}}>{fmtFCFA(totalDepense)}</b></div>
        <div className="row between" style={{marginBottom:6}}><span>Marge brute</span><b>{fmtFCFA(totalMarge)}</b></div>
        <div className="row between" style={{borderTop:"1px dashed var(--border)", paddingTop:6}}>
          <span>Bénéfice net</span><b className="gold">{fmtFCFA(totalNet)}</b>
        </div>
        <button className="btn" style={{marginTop:10}} onClick={genererPDF}>📄 Enregistrer en PDF</button>
      </div>
      <div className="card">
        <h3>Détail par jour</h3>
        {lignesJours.length===0 ? <div className="empty">Aucune donnée pour ce mois</div> :
          lignesJours.map(l=>(
            <div className="list-item" key={l.jour}>
              <div><div>{formatDateFR(l.jour)}</div><div className="meta">Dépenses : {fmtFCFA(l.depense)} • Marge : {fmtFCFA(l.marge)}</div></div>
              <b>{fmtFCFA(l.ca)}</b>
            </div>
          ))
        }
      </div>
    </div>
  );
}

        <div className="card">
          <h3>📤 Rapport journalier WhatsApp</h3>
          <div className="field">
            <label>Numéro WhatsApp (avec indicatif pays, ex : +22670000000)</label>
            <input value={whatsappRapport} placeholder="+226XXXXXXXX" onChange={e=>setWhatsappRapport(e.target.value)}/>
          </div>
          <p style={{fontSize:11, color:"var(--text-dim)"}}>
            Ce numéro sera utilisé par le bouton "Envoyer sur WhatsApp" (onglet Export) pour préparer le rapport du jour.
            Par sécurité, WhatsApp exige toujours une confirmation manuelle avant l'envoi (aucun message n'est envoyé automatiquement en arrière-plan).
          </p>
          <button className="btn" style={{marginTop:8}} onClick={sauverParams}>Enregistrer les paramètres</button>
        </div>
      )}

      {tab==="params" && (
        <div className="card">
          <h3>🎁 Programme de fidélité</h3>
          <div className="field">
            <label>Offre due tous les X achats d'un même client</label>
            <input type="number" min="2" value={fideliteSeuil} onChange={e=>setFideliteSeuil(e.target.value)} />
          </div>
          <p style={{fontSize:11, color:"var(--text-dim)"}}>
            Dès qu'un client (identifié par son numéro de téléphone) atteint ce nombre d'achats, il apparaît comme "Offre due" dans l'onglet Équipe → Fidélité.
          </p>
          <button className="btn" style={{marginTop:8}} onClick={sauverParams}>Enregistrer les paramètres</button>
        </div>
      )}

      {tab==="export" && (
        <ExportModule state={state} settings={settings} journee={journee} />
      )}

      {tab==="avoirs" && (
        <AvoirsModule state={state} patchState={patchState} currentUser={currentUser} journee={journee} settings={settings} />
      )}

      {tab==="global" && (
        <div className="card">
          <h3>Vue globale (toutes journées)</h3>
          {Object.keys(state.clotures).length===0 ? <div className="empty">Aucune clôture enregistrée</div> :
            Object.entries(state.clotures).sort((a,b)=>b[0].localeCompare(a[0])).map(([jour,c])=>{
              const totalRecette = (c.recetteTerrasse||0)+(c.recetteBar||0)+(c.recetteCave||0);
              const totalDepense = (c.depenseTerrasse||0)+(c.depenseBar||0)+(c.depenseCave||0);
              return (
                <div className="list-item" key={jour}>
                  <div>
                    <div>{formatDateFR(jour)}</div>
                    <div className="meta">{c.cloture? ("Clôturé par "+c.cloturePar) : "En cours"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:"var(--green)"}}>{fmtFCFA(totalRecette)}</div>
                    <div style={{color:"var(--red)", fontSize:11}}>-{fmtFCFA(totalDepense)}</div>
                  </div>
                </div>
              );
            })
          }
        </div>
      )}

      {tab==="abonnement" && (
        <div className="card">
          <h3>Abonnement de l'établissement</h3>
          <p className="meta">Ce code identifie ton bar. Donne-le à ton gérant/caissier pour qu'ils rejoignent
            le même bar depuis leur propre téléphone (menu "Rejoindre un bar existant" au premier lancement).</p>
          <div style={{display:"flex", alignItems:"center", gap:8, margin:"10px 0"}}>
            <code style={{background:"var(--bg3)", padding:"6px 10px", borderRadius:6, fontSize:14}}>{shopId}</code>
            <button className="btn secondary" onClick={copierCode}>{codeCopie?"Copié !":"Copier"}</button>
          </div>
          {subscription ? (
            <>
              <div className="meta">Plan : <b>{subscription.plan||"—"}</b></div>
              <div className="meta">Statut : <b style={{color: subscription.actif===false?"var(--red)":"var(--green)"}}>
                {subscription.actif===false ? "Suspendu" : "Actif"}</b></div>
              <div className="meta">Expire le : {subscription.dateExpiration ? formatDateFR(subscription.dateExpiration.slice(0,10)) : "—"}</div>
              <p style={{marginTop:10, fontSize:13, color:"var(--text-dim)"}}>Pour renouveler ou changer de plan, contacte Digitale Solution au {subscription.contactWhatsapp||"22678548317"}.</p>
            </>
          ) : <div className="empty">Informations d'abonnement indisponibles hors-ligne.</div>}
        </div>
      )}
    </div>
  );
}

/* =====================================================================
   ÉCRAN DE CONFIGURATION DU BAR (multi-tenant)
   Au tout premier lancement sur un appareil, on doit savoir à quel bar
   (shopId) cet appareil appartient : soit on crée un nouveau bar, soit on
   rejoint un bar déjà existant (autre caissier/gérant du même bar).
   ===================================================================== */
function ShopSetupScreen({onResolu}){
  const [mode,setMode] = useState(null); // null | "creer" | "rejoindre"
  const [nom,setNom] = useState("");
  const [codeSaisi,setCodeSaisi] = useState("");
  const [busy,setBusy] = useState(false);
  const [erreur,setErreur] = useState("");

  const creerBar = async ()=>{
    if(!nom.trim()){ setErreur("Indique le nom de ton bar/établissement."); return; }
    setBusy(true); setErreur("");
    const id = genererShopId();
    setShopIdActif(id);
    if(firebaseOK){
      const dansTrenteJours = new Date(); dansTrenteJours.setDate(dansTrenteJours.getDate()+30);
      await shopDocRef().set({
        nomEtablissement: nom.trim(), plan:"essai", actif:true,
        dateCreation: new Date().toISOString(), dateExpiration: dansTrenteJours.toISOString(),
        contactWhatsapp: "22678548317",
      }, {merge:true}).catch(()=>{});
    }
    localStorage.setItem(DEVICE_SHOP_KEY, id);
    onResolu(id);
  };

  const rejoindreBar = async ()=>{
    const id = codeSaisi.trim();
    if(!id){ setErreur("Entre le code du bar fourni par ton gérant/propriétaire."); return; }
    setBusy(true); setErreur("");
    if(firebaseOK){
      try{
        const doc = await db.collection("shops").doc(id).get();
        if(!doc.exists){ setErreur("Aucun bar ne correspond à ce code. Vérifie-le auprès du propriétaire."); setBusy(false); return; }
      }catch(e){ setErreur("Impossible de vérifier le code (connexion instable)."); setBusy(false); return; }
    }
    setShopIdActif(id);
    localStorage.setItem(DEVICE_SHOP_KEY, id);
    onResolu(id);
  };

  return (
    <div className="login-wrap">
      <div className="brand"><h1>BURKINA AMBIANCE</h1><p>Configuration de l'établissement</p></div>
      {mode===null && (
        <div style={{display:"flex", flexDirection:"column", gap:12, width:"100%", maxWidth:320}}>
          <button className="btn" onClick={()=>setMode("creer")}>➕ Créer un nouveau bar</button>
          <button className="btn secondary" onClick={()=>setMode("rejoindre")}>🔗 Rejoindre un bar existant</button>
        </div>
      )}
      {mode==="creer" && (
        <div style={{display:"flex", flexDirection:"column", gap:10, width:"100%", maxWidth:320}}>
          <input placeholder="Nom du bar / établissement" value={nom} onChange={e=>setNom(e.target.value)} />
          {erreur && <div style={{color:"var(--red)", fontSize:13}}>{erreur}</div>}
          <button className="btn" disabled={busy} onClick={creerBar}>{busy?"...":"Créer ce bar"}</button>
          <button className="btn secondary" onClick={()=>{setMode(null); setErreur("");}}>Retour</button>
        </div>
      )}
      {mode==="rejoindre" && (
        <div style={{display:"flex", flexDirection:"column", gap:10, width:"100%", maxWidth:320}}>
          <input placeholder="Code du bar (ex: bar-a1b2c3)" value={codeSaisi} onChange={e=>setCodeSaisi(e.target.value)} />
          {erreur && <div style={{color:"var(--red)", fontSize:13}}>{erreur}</div>}
          <button className="btn" disabled={busy} onClick={rejoindreBar}>{busy?"...":"Rejoindre"}</button>
          <button className="btn secondary" onClick={()=>{setMode(null); setErreur("");}}>Retour</button>
        </div>
      )}
    </div>
  );
}

/* Écran de blocage quand l'abonnement du bar est expiré ou suspendu. */
function AbonnementExpireScreen({subscription, shopId, onOuvrirDevPanel}){
  const contact = (subscription && subscription.contactWhatsapp) || "22678548317";
  const demanderAcces = ()=>{
    const code = prompt("Code d'accès développeur :");
    if(code===null) return;
    if(code.trim() !== DEV_PANEL_PIN){ alert("Code incorrect."); return; }
    onOuvrirDevPanel();
  };
  return (
    <div className="login-wrap">
      <div className="brand"><h1>ABONNEMENT INACTIF</h1><p>Accès suspendu</p></div>
      <div style={{textAlign:"center", maxWidth:320, color:"var(--text-dim)", fontSize:14, lineHeight:1.5}}>
        <p>L'abonnement de cet établissement est expiré ou suspendu.</p>
        {subscription && subscription.dateExpiration && (
          <p>Expiré depuis le {formatDateFR(subscription.dateExpiration.slice(0,10))}.</p>
        )}
        <p>Contacte Digitale Solution pour réactiver l'accès.</p>
      </div>
      <a className="btn" style={{background:"var(--green)", color:"#fff", textDecoration:"none"}}
        href={"https://wa.me/"+contact+"?text="+encodeURIComponent("Bonjour, je souhaite réactiver l'abonnement de mon bar (code: "+shopId+").")}
        target="_blank" rel="noreferrer">💬 Contacter sur WhatsApp</a>
      <button className="btn secondary" onClick={demanderAcces}>Accès développeur</button>
    </div>
  );
}

/* Panneau développeur : vue d'ensemble et gestion des abonnements de tous les bars. */
function DevPanel({shopId, subscription, onFermer}){
  const [bars,setBars] = useState(null);

  useEffect(()=>{
    if(!firebaseOK) return;
    const unsub = db.collection("shops").onSnapshot(snap=>{
      setBars(snap.docs.map(d=>({id:d.id, ...d.data()})));
    }, err=>console.warn("Sync panneau développeur indisponible :", err.message));
    return unsub;
  },[]);

  const majBar = (id, patch)=>{
    if(!firebaseOK) return;
    db.collection("shops").doc(id).set(patch, {merge:true}).catch(()=>{});
  };
  const prolonger = (bar, jours)=>{
    const base = (bar.dateExpiration && new Date(bar.dateExpiration) > new Date()) ? new Date(bar.dateExpiration) : new Date();
    base.setDate(base.getDate()+jours);
    majBar(bar.id, {dateExpiration: base.toISOString(), actif:true});
  };

  return (
    <div className="content" style={{maxWidth:600, margin:"0 auto"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
        <h3 style={{margin:0}}>🛠️ Panneau développeur</h3>
        <button className="btn secondary" onClick={onFermer}>Fermer</button>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="meta">Bar courant (cet appareil)</div>
        <div><b>{shopId}</b></div>
      </div>
      {!firebaseOK && <div className="card">Firestore indisponible hors-ligne : le panneau développeur nécessite une connexion.</div>}
      {firebaseOK && bars===null && <div className="card">Chargement des bars…</div>}
      {firebaseOK && bars && bars.length===0 && <div className="card">Aucun bar enregistré pour le moment.</div>}
      {firebaseOK && bars && bars.map(bar=>{
        const expire = bar.actif===false || (bar.dateExpiration && new Date(bar.dateExpiration) < new Date());
        return (
          <div className="card" key={bar.id} style={{marginBottom:10}}>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <b>{bar.nomEtablissement || "(sans nom)"}</b>
              <span className={"pill "+(expire?"danger":"ok")}>{expire?"Expiré":"Actif"}</span>
            </div>
            <div className="meta">Code : {bar.id}</div>
            <div className="meta">Plan : {bar.plan||"—"} · Expire le {bar.dateExpiration ? formatDateFR(bar.dateExpiration.slice(0,10)) : "—"}</div>
            <div style={{display:"flex", gap:6, flexWrap:"wrap", marginTop:8}}>
              <button className="btn" onClick={()=>prolonger(bar,30)}>+30 jours</button>
              <button className="btn" onClick={()=>prolonger(bar,365)}>+1 an</button>
              {bar.actif===false
                ? <button className="btn" onClick={()=>majBar(bar.id,{actif:true})}>Réactiver</button>
                : <button className="btn danger" onClick={()=>majBar(bar.id,{actif:false})}>Suspendre</button>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* =====================================================================
   APPLICATION PRINCIPALE
   ===================================================================== */
function App({shopId}){
  const [subscription,setSubscription] = useState(null);
  const [subLoading,setSubLoading] = useState(true);
  const [devPanelOpen,setDevPanelOpen] = useState(false);

  // Charge / crée le document d'abonnement du bar (shops/{shopId}) et écoute
  // ses changements en temps réel (utile si le panneau développeur modifie
  // le plan depuis un autre appareil pendant que la caisse est ouverte).
  useEffect(()=>{
    if(!firebaseOK){ setSubLoading(false); return; }
    const unsub = shopDocRef().onSnapshot(async (doc)=>{
      if(doc.exists){
        setSubscription(doc.data());
        setSubLoading(false);
      }else{
        const dansTrenteJours = new Date(); dansTrenteJours.setDate(dansTrenteJours.getDate()+30);
        const nouveau = {
          nomEtablissement: "Burkina Ambiance",
          plan: "essai",
          actif: true,
          dateCreation: new Date().toISOString(),
          dateExpiration: dansTrenteJours.toISOString(),
          contactWhatsapp: "22678548317",
        };
        await shopDocRef().set(nouveau, {merge:true}).catch(()=>{});
      }
    }, err=>{ console.warn("Sync abonnement indisponible :", err.message); setSubLoading(false); });
    return unsub;
  },[]);

  const abonnementExpire = subscription && (
    subscription.actif===false ||
    (subscription.dateExpiration && new Date(subscription.dateExpiration) < new Date())
  );

  const [state,setState] = useState(()=>{
    const ls = loadLS();
    return {
      users: ls.users || [
        // Propriétaire par défaut — PIN 999999 (à changer après premier lancement)
      ],
      produits: (ls.produits || PRODUITS_DEFAUT.map(p=>({id:uid(), ...p}))).map(p=>({prixAchat:0, stock:0, seuilAlerte:5, ...p})),
      stock: ls.stock || {},
      clotures: ls.clotures || {},
      avoirs: ls.avoirs || [],
      ventes: ls.ventes || [],
      mouvements: ls.mouvements || [],
    };
  });
  const [settings,setSettings] = useState(()=>{
    const ls = loadLS();
    return ls.settings || {heureArret:2, nomEtablissement:"Burkina Ambiance", theme:"sombre", fideliteSeuil:10};
  });
  const [currentUser,setCurrentUser] = useState(null);
  const [tab,setTab] = useState("vente");
  const [online,setOnline] = useState(navigator.onLine);
  const bootRef = useRef(false);

  // Bootstrap : créer un compte propriétaire par défaut si aucun compte owner n'existe
  useEffect(()=>{
    if(bootRef.current) return;
    bootRef.current = true;
    if(!state.users.some(u=>u.role==="owner")){
      hashPin("999999").then(h=>{
        setState(s=>({...s, users:[...s.users, {id:uid(), nom:"Propriétaire", role:"owner", zone:"toutes", pinHash:h, actif:true}]}));
      });
    }
  },[]);

  useEffect(()=>{
    const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener('online',on); window.addEventListener('offline',off);
    return ()=>{window.removeEventListener('online',on); window.removeEventListener('offline',off);};
  },[]);

  // Applique le thème choisi (clair / néon sombre / sombre) sur la page entière
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', settings.theme || 'sombre');
  },[settings.theme]);

  /* =====================================================================
     SYNCHRONISATION TEMPS REEL MULTI-APPAREIL
     Écoute Firestore en continu : dès qu'un appareil écrit une donnée,
     tous les autres appareils connectés reçoivent la mise à jour ici.
     Ne fonctionne que si firebaseConfig contient de vrais identifiants
     (voir en haut du fichier) et que les règles Firestore autorisent
     la lecture/écriture.
     ===================================================================== */
  useEffect(()=>{
    if(!firebaseOK) return;
    const unsubs = [];

    unsubs.push(shopCol("users").onSnapshot(snap=>{
      const users = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(users.length) setState(s=>({...s, users}));
    }, err=>console.warn("Sync utilisateurs indisponible :", err.message)));

    unsubs.push(shopCol("produits").onSnapshot(snap=>{
      const produits = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(produits.length) setState(s=>({...s, produits}));
    }, err=>console.warn("Sync produits indisponible :", err.message)));

    unsubs.push(shopCol("ventes").onSnapshot(snap=>{
      const ventes = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setState(s=>({...s, ventes}));
    }, err=>console.warn("Sync ventes indisponible :", err.message)));

    unsubs.push(shopCol("avoirs").onSnapshot(snap=>{
      const avoirs = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setState(s=>({...s, avoirs}));
    }, err=>console.warn("Sync avoirs indisponible :", err.message)));

    unsubs.push(shopCol("mouvements").onSnapshot(snap=>{
      const mouvements = snap.docs.map(d=>({id:d.id, ...d.data()}));
      setState(s=>({...s, mouvements}));
    }, err=>console.warn("Sync mouvements indisponible :", err.message)));

    unsubs.push(shopCol("clotures").onSnapshot(snap=>{
      const clotures = {};
      snap.docs.forEach(d=>{ clotures[d.id] = d.data(); });
      setState(s=>({...s, clotures}));
    }, err=>console.warn("Sync clôtures indisponible :", err.message)));

    unsubs.push(shopCol("stock").onSnapshot(snap=>{
      setState(s=>{
        const stock = {...s.stock};
        snap.docs.forEach(d=>{
          const data = d.data();
          if(!data.journee || !data.zone) return;
          if(!stock[data.journee]) stock[data.journee] = {};
          stock[data.journee] = {...stock[data.journee], [data.zone]: data.produits || {}};
        });
        return {...s, stock};
      });
    }, err=>console.warn("Sync stock indisponible :", err.message)));

    unsubs.push(shopCol("settings").doc("global").onSnapshot(doc=>{
      if(doc.exists) setSettings(s=>({...s, ...doc.data()}));
    }, err=>console.warn("Sync paramètres indisponible :", err.message)));

    return ()=> unsubs.forEach(u=>u());
  },[]);

  // Persistance locale à chaque changement d'état
  useEffect(()=>{ saveLS({...state, settings}); },[state, settings]);

  const patchState = useCallback((mutator)=>{
    setState(prev=>{
      const draft = JSON.parse(JSON.stringify(prev));
      mutator(draft);
      return draft;
    });
  },[]);

  const patchSettings = useCallback((patch)=>{
    setSettings(prev=>{
      const nouveau = {...prev, ...patch};
      queueWrite("settings", "global", nouveau);
      return nouveau;
    });
  },[]);

  const journee = useMemo(()=>journeeComptable(new Date(), settings.heureArret ?? 2), [settings.heureArret]);

  const defaultTab = (role)=> role==="owner" ? "dashboard" : role==="gerant" ? "rapport" : "vente";

  const handleLogin = (pinHash, onFail)=>{
    const user = state.users.find(u=>u.pinHash===pinHash && u.actif);
    if(!user){ onFail("PIN incorrect"); return; }
    setCurrentUser(user);
    setTab(defaultTab(user.role));
  };

  const creerProprietaireUrgence = ()=>{
    return hashPin("999999").then(h=>{
      const nouveauProprietaire = {id:uid(), nom:"Propriétaire", role:"owner", zone:"toutes", pinHash:h, actif:true};
      setState(s=>({...s, users:[...s.users, nouveauProprietaire]}));
      return nouveauProprietaire;
    });
  };

  // Abonnement expiré/suspendu : on bloque l'accès à la caisse (sauf via le
  // panneau développeur, accessible par triple-clic sur le titre + code PIN).
  if(!subLoading && abonnementExpire && !devPanelOpen){
    return <AbonnementExpireScreen subscription={subscription} shopId={shopId}
      onOuvrirDevPanel={()=>setDevPanelOpen(true)} />;
  }

  if(devPanelOpen){
    return <DevPanel shopId={shopId} subscription={subscription}
      onFermer={()=>setDevPanelOpen(false)} />;
  }

  if(!currentUser){
    return <LoginScreen onLogin={handleLogin} settings={settings} users={state.users}
      onCreerProprietaire={creerProprietaireUrgence}
      onOuvrirDevPanel={()=>setDevPanelOpen(true)}
      onBypass={(u)=>{ setCurrentUser(u); setTab(defaultTab(u.role)); }} />;
  }

  const tabsFor = {
    owner: [
      {id:"dashboard", label:"KPI", ic:"📊"},
      {id:"rapport", label:"Ventes", ic:"🧾"},
      {id:"produits", label:"Produits", ic:"➕"},
      {id:"admin", label:"Admin", ic:"👑"},
    ],
    gerant: [
      {id:"rapport", label:"Ventes", ic:"🧾"},
      {id:"stock", label:"Stock", ic:"📦"},
      {id:"reappro", label:"Réappro", ic:"📥"},
      {id:"dettes", label:"Dettes", ic:"💳"},
      {id:"classement", label:"Équipe", ic:"🏆"},
      {id:"cloture", label:"Arrêt", ic:"🔒"},
    ],
    caissier: [
      {id:"vente", label:"Catalogue", ic:"🛒"},
      {id:"mesventes", label:"Mes ventes", ic:"📈"},
      {id:"creances", label:"Créances", ic:"💳"},
      {id:"avoirs", label:"Avoirs", ic:"📄"},
    ],
  };
  const tabs = tabsFor[currentUser.role] || tabsFor.caissier;

  return (
    <React.Fragment>
      <div className="topbar">
        <div className="who">
          <b>{currentUser.nom}</b>
          <span><span className={"pill "+currentUser.role}>{currentUser.role}</span> · {formatDateFR(journee)}</span>
        </div>
        <div className="row" style={{gap:8}}>
          <span className={"badge-sync " + (online?"on":"off")}>{online?"En ligne":"Hors ligne"}</span>
          <button className="icon-btn" onClick={()=>setCurrentUser(null)} title="Déconnexion">⏻</button>
        </div>
      </div>

      <div className="content">
        {tab==="vente" && currentUser.role==="caissier" && <VenteModule state={state} patchState={patchState} currentUser={currentUser} journee={journee} settings={settings} />}
        {tab==="mesventes" && currentUser.role==="caissier" && <MesVentesModule state={state} patchState={patchState} currentUser={currentUser} journee={journee} settings={settings} />}
        {tab==="creances" && currentUser.role==="caissier" && <MesCreancesModule state={state} patchState={patchState} currentUser={currentUser} settings={settings} />}
        {tab==="avoirs" && <AvoirsModule state={state} patchState={patchState} currentUser={currentUser} journee={journee} settings={settings} />}
        {tab==="stock" && currentUser.role!=="owner" && <StockModule state={state} patchState={patchState} currentUser={currentUser} journee={journee} />}
        {tab==="reappro" && currentUser.role==="gerant" && <ReapproModule state={state} patchState={patchState} currentUser={currentUser} />}
        {tab==="dettes" && currentUser.role==="gerant" && <DettesModule state={state} patchState={patchState} settings={settings} />}
        {tab==="classement" && currentUser.role==="gerant" && <ClassementModule state={state} settings={settings} />}
        {tab==="cloture" && currentUser.role==="gerant" && <ClotureModule state={state} patchState={patchState} currentUser={currentUser} journee={journee} />}
        {tab==="rapport" && (currentUser.role==="gerant" || currentUser.role==="owner") && <VentesModule state={state} patchState={patchState} journee={journee} />}
        {tab==="dashboard" && currentUser.role==="owner" && <DashboardModule state={state} journee={journee} />}
        {tab==="produits" && currentUser.role==="owner" && <ProduitsModule state={state} patchState={patchState} />}
        {tab==="admin" && currentUser.role==="owner" && <OwnerModule state={state} patchState={patchState} settings={settings} patchSettings={patchSettings} currentUser={currentUser} journee={journee} shopId={shopId} subscription={subscription} />}
      </div>

      <div className="tabbar">
        {tabs.map(t=>(
          <button key={t.id} className={"tab " + (tab===t.id?"active":"")} onClick={()=>setTab(t.id)}>
            <span className="ic">{t.ic}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </React.Fragment>
  );
}

/* Racine : détermine d'abord à quel bar (shopId) cet appareil appartient
   avant de monter l'application principale. */
function Root(){
  const [shopId,setShopId] = useState(()=>localStorage.getItem(DEVICE_SHOP_KEY) || null);
  useEffect(()=>{ if(shopId) setShopIdActif(shopId); },[shopId]);
  if(!shopId){
    return <ShopSetupScreen onResolu={(id)=>setShopId(id)} />;
  }
  return <App key={shopId} shopId={shopId} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(e=>console.warn("Service worker non enregistré :", e));
  });
}
</script>
</body>
</html>
